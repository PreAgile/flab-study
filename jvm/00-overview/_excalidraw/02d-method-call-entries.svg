<svg xmlns="http://www.w3.org/2000/svg" viewBox="20 0 1110 667" width="1110" height="667" font-family="-apple-system,BlinkMacSystemFont,&apos;Apple SD Gothic Neo&apos;,&apos;Pretendard&apos;,&apos;Noto Sans KR&apos;,&apos;Malgun Gothic&apos;,&apos;Helvetica Neue&apos;,Helvetica,Arial,sans-serif">
<defs>
<marker id="arrowhead" viewBox="0 0 10 10" refX="9" refY="5" markerUnits="strokeWidth" markerWidth="6" markerHeight="6" orient="auto">
<path d="M 0 0 L 10 5 L 0 10 z" fill="#1e1e1e"/>
</marker>
</defs>
<rect x="20" y="0" width="1110" height="667" fill="#ffffff"/>
<rect x="80" y="120" width="380" height="280" rx="8" ry="8" stroke="#f57c00" fill="#fff8e1" stroke-width="2"/>
<rect x="720" y="120" width="380" height="280" rx="8" ry="8" stroke="#00695c" fill="#e0f2f1" stroke-width="2"/>
<rect x="110" y="200" width="320" height="60" rx="8" ry="8" stroke="#f57c00" fill="#fff8e1" stroke-width="2"/>
<rect x="110" y="290" width="320" height="60" rx="8" ry="8" stroke="#f57c00" fill="#fff8e1" stroke-width="2"/>
<rect x="750" y="200" width="320" height="60" rx="8" ry="8" stroke="#00695c" fill="#e0f2f1" stroke-width="2"/>
<rect x="750" y="290" width="320" height="60" rx="8" ry="8" stroke="#00695c" fill="#e0f2f1" stroke-width="2"/>
<path d="M 270,265 L 270,285" stroke="#1e1e1e" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" marker-end="url(#arrowhead)"/>
<path d="M 910,265 L 910,285" stroke="#1e1e1e" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" marker-end="url(#arrowhead)"/>
<path d="M 430,225 L 720,315" stroke="#1e1e1e" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" marker-end="url(#arrowhead)"/>
<path d="M 720,225 L 430,315" stroke="#1e1e1e" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" marker-end="url(#arrowhead)"/>
<text x="50" y="54" text-anchor="start" font-size="24" fill="#1e1e1e">메서드 호출: Interpreter ↔ Compiled 사이의 4가지 entry</text>
<text x="50" y="75" text-anchor="start" font-size="13" fill="#666">컴파일 완료 시 entry pointer만 갈아끼우면 다음 호출부터 자동으로 native로</text>
<text x="270" y="266" text-anchor="middle" font-size="16" fill="#1e1e1e"></text>
<text x="100" y="153" text-anchor="start" font-size="18" fill="#1e1e1e">Interpreter 세계</text>
<text x="100" y="174" text-anchor="start" font-size="12" fill="#666">bytecode 한 줄씩 해석</text>
<text x="910" y="266" text-anchor="middle" font-size="16" fill="#1e1e1e"></text>
<text x="740" y="153" text-anchor="start" font-size="18" fill="#1e1e1e">Compiled 세계 (Code Cache)</text>
<text x="740" y="174" text-anchor="start" font-size="12" fill="#666">JIT이 만든 native code</text>
<text x="270" y="235" text-anchor="middle" font-size="14" fill="#1e1e1e">Caller (interpreter)</text>
<text x="270" y="325" text-anchor="middle" font-size="14" fill="#1e1e1e">Callee (interpreter)</text>
<text x="910" y="235" text-anchor="middle" font-size="14" fill="#1e1e1e">Caller (compiled native)</text>
<text x="910" y="325" text-anchor="middle" font-size="14" fill="#1e1e1e">Callee (compiled native)</text>
<text x="325" y="279" text-anchor="middle" font-size="11" fill="#444">_i2i_entry</text>
<text x="1010" y="279" text-anchor="middle" font-size="11" fill="#444">_from_compiled_entry</text>
<text x="540" y="257" text-anchor="start" font-size="12" fill="#1565c0">_i2c_entry (adapter)</text>
<text x="540" y="274" text-anchor="start" font-size="11" fill="#666">interp → compiled</text>
<text x="540" y="297" text-anchor="start" font-size="12" fill="#c2185b">_c2i_entry (adapter)</text>
<text x="540" y="314" text-anchor="start" font-size="11" fill="#666">compiled → interp</text>
<text x="50" y="455" text-anchor="start" font-size="15" fill="#1e1e1e">각 메서드 메타데이터 안의 4개 entry pointer:</text>
<text x="50" y="483" text-anchor="start" font-size="13" fill="#1565c0">• _i2i_entry</text>
<text x="260" y="483" text-anchor="start" font-size="13" fill="#444">interp → interp 직접 호출</text>
<text x="50" y="508" text-anchor="start" font-size="13" fill="#1565c0">• _i2c_entry</text>
<text x="260" y="508" text-anchor="start" font-size="13" fill="#444">interp → compiled (adapter가 calling convention 변환)</text>
<text x="50" y="533" text-anchor="start" font-size="13" fill="#1565c0">• _c2i_entry</text>
<text x="260" y="533" text-anchor="start" font-size="13" fill="#444">compiled → interp (adapter가 역변환)</text>
<text x="50" y="558" text-anchor="start" font-size="13" fill="#1565c0">• _from_compiled_entry</text>
<text x="260" y="558" text-anchor="start" font-size="13" fill="#444">compiled → compiled 직접 점프</text>
<text x="50" y="614" text-anchor="start" font-size="14" fill="#c62828">★ JIT 컴파일 완료 시: entry pointer를 native code 주소로 갱신</text>
<text x="50" y="634" text-anchor="start" font-size="12" fill="#666">  → 호출자 코드는 안 바꿈. 다음 호출자부터 자동으로 native로 점프</text>
</svg>