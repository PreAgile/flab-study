<svg xmlns="http://www.w3.org/2000/svg" viewBox="20 0 1430 485" width="1430" height="485" font-family="-apple-system,BlinkMacSystemFont,&apos;Apple SD Gothic Neo&apos;,&apos;Pretendard&apos;,&apos;Noto Sans KR&apos;,&apos;Malgun Gothic&apos;,&apos;Helvetica Neue&apos;,Helvetica,Arial,sans-serif">
<defs>
<marker id="arrowhead" viewBox="0 0 10 10" refX="9" refY="5" markerUnits="strokeWidth" markerWidth="6" markerHeight="6" orient="auto">
<path d="M 0 0 L 10 5 L 0 10 z" fill="#1e1e1e"/>
</marker>
</defs>
<rect x="20" y="0" width="1430" height="485" fill="#ffffff"/>
<rect x="50" y="110" width="160" height="70" rx="8" ry="8" stroke="#1565c0" fill="#e3f2fd" stroke-width="2"/>
<rect x="260" y="110" width="160" height="70" rx="8" ry="8" stroke="#6a1b9a" fill="#f3e5f5" stroke-width="2"/>
<rect x="460" y="110" width="160" height="70" rx="8" ry="8" stroke="#6a1b9a" fill="#f3e5f5" stroke-width="2"/>
<rect x="660" y="110" width="160" height="70" rx="8" ry="8" stroke="#283593" fill="#e8eaf6" stroke-width="2"/>
<rect x="860" y="110" width="160" height="70" rx="8" ry="8" stroke="#6a1b9a" fill="#f3e5f5" stroke-width="2"/>
<rect x="1060" y="110" width="160" height="70" rx="8" ry="8" stroke="#6a1b9a" fill="#f3e5f5" stroke-width="2"/>
<rect x="1260" y="110" width="160" height="70" rx="8" ry="8" stroke="#2e7d32" fill="#e8f5e9" stroke-width="2"/>
<path d="M 210,145 L 250,145" stroke="#1e1e1e" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" marker-end="url(#arrowhead)"/>
<path d="M 420,145 L 460,145" stroke="#1e1e1e" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" marker-end="url(#arrowhead)"/>
<path d="M 620,145 L 660,145" stroke="#1e1e1e" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" marker-end="url(#arrowhead)"/>
<path d="M 820,145 L 860,145" stroke="#1e1e1e" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" marker-end="url(#arrowhead)"/>
<path d="M 1020,145 L 1060,145" stroke="#1e1e1e" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" marker-end="url(#arrowhead)"/>
<path d="M 1220,145 L 1260,145" stroke="#1e1e1e" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" marker-end="url(#arrowhead)"/>
<text x="50" y="54" text-anchor="start" font-size="24" fill="#1e1e1e">javac: .java → .class (5단계)</text>
<text x="50" y="75" text-anchor="start" font-size="13" fill="#666">각 단계가 한 가지 일만 한다 — Lombok 같은 도구가 끼어들 수 있는 이유</text>
<text x="130" y="141" text-anchor="middle" font-size="16" fill="#1e1e1e">.java</text>
<text x="130" y="161" text-anchor="middle" font-size="16" fill="#1e1e1e">(소스 텍스트)</text>
<text x="340" y="141" text-anchor="middle" font-size="15" fill="#1e1e1e">1. Lexer</text>
<text x="340" y="160" text-anchor="middle" font-size="15" fill="#1e1e1e">(Tokenization)</text>
<text x="540" y="141" text-anchor="middle" font-size="15" fill="#1e1e1e">2. Parser</text>
<text x="540" y="160" text-anchor="middle" font-size="15" fill="#1e1e1e">(AST 생성)</text>
<text x="740" y="141" text-anchor="middle" font-size="15" fill="#1e1e1e">3. Annotation</text>
<text x="740" y="160" text-anchor="middle" font-size="15" fill="#1e1e1e">Processor</text>
<text x="940" y="141" text-anchor="middle" font-size="15" fill="#1e1e1e">4. Semantic</text>
<text x="940" y="160" text-anchor="middle" font-size="15" fill="#1e1e1e">Analysis</text>
<text x="1140" y="141" text-anchor="middle" font-size="15" fill="#1e1e1e">5. Bytecode</text>
<text x="1140" y="160" text-anchor="middle" font-size="15" fill="#1e1e1e">Generation</text>
<text x="1340" y="141" text-anchor="middle" font-size="16" fill="#1e1e1e">.class</text>
<text x="1340" y="161" text-anchor="middle" font-size="16" fill="#1e1e1e">(바이트코드)</text>
<text x="345" y="212" text-anchor="middle" font-size="12" fill="#333">글자 → 토큰</text>
<text x="345" y="233" text-anchor="middle" font-size="11" fill="#666">int, c, =, a, +, b, ;</text>
<text x="545" y="212" text-anchor="middle" font-size="12" fill="#333">토큰 → AST</text>
<text x="545" y="233" text-anchor="middle" font-size="11" fill="#666">VarDecl(int, c,</text>
<text x="545" y="247" text-anchor="middle" font-size="11" fill="#666">  BinaryOp(+,</text>
<text x="545" y="260" text-anchor="middle" font-size="11" fill="#666">    a, b))</text>
<text x="745" y="212" text-anchor="middle" font-size="12" fill="#333">★ Lombok/MapStruct</text>
<text x="745" y="233" text-anchor="middle" font-size="11" fill="#666">@Getter →</text>
<text x="745" y="247" text-anchor="middle" font-size="11" fill="#666">메서드 노드 삽입</text>
<text x="745" y="260" text-anchor="middle" font-size="11" fill="#666">라운드 반복</text>
<text x="945" y="212" text-anchor="middle" font-size="12" fill="#333">타입/스코프 검사</text>
<text x="945" y="233" text-anchor="middle" font-size="11" fill="#666">int x = "a" →</text>
<text x="945" y="247" text-anchor="middle" font-size="11" fill="#666">컴파일 에러</text>
<text x="945" y="260" text-anchor="middle" font-size="11" fill="#666">+ Desugar</text>
<text x="1145" y="212" text-anchor="middle" font-size="12" fill="#333">AST 후위순회</text>
<text x="1145" y="233" text-anchor="middle" font-size="11" fill="#666">iload_1</text>
<text x="1145" y="247" text-anchor="middle" font-size="11" fill="#666">iload_2</text>
<text x="1145" y="260" text-anchor="middle" font-size="11" fill="#666">iadd</text>
<text x="1145" y="274" text-anchor="middle" font-size="11" fill="#666">istore_3</text>
<text x="50" y="376" text-anchor="start" font-size="16" fill="#1e1e1e">왜 5단계로 쪼갰나?</text>
<text x="50" y="403" text-anchor="start" font-size="13" fill="#444">• Lexer/Parser 재사용 → IDE, formatter, Lombok이 모두 같은 API 사용</text>
<text x="50" y="419" text-anchor="start" font-size="13" fill="#444">• AST가 만들어진 직후에 Annotation Processor가 끼어들 수 있는 "틈"이 생김</text>
<text x="50" y="436" text-anchor="start" font-size="13" fill="#444">• Semantic Analysis가 분리돼야 타입 검사 알고리즘 디버깅 가능</text>
<text x="50" y="452" text-anchor="start" font-size="13" fill="#444">• 각 단계가 한 가지 일만 하면 컴파일러 자체의 테스트·확장이 쉬워짐</text>
</svg>