<rect x="70" y="350" width="240" height="40" rx="8" ry="8" stroke="#f57c00" fill="#fff8e1" stroke-width="2"/>
<rect x="70" y="410" width="240" height="35" rx="8" ry="8" stroke="#f57c00" fill="#fff8e1" stroke-width="2"/>
<rect x="50" y="490" width="280" height="80" rx="8" ry="8" stroke="#d84315" fill="#ffe0b2" stroke-width="2"/>
