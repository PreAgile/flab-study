<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 600" width="1200" height="600" font-family="-apple-system,BlinkMacSystemFont,'Apple SD Gothic Neo','Pretendard','Noto Sans KR','Malgun Gothic','Helvetica Neue',Helvetica,Arial,sans-serif">
  <rect x="0" y="0" width="1200" height="600" fill="#ffffff"/>
  <text x="30" y="40" font-size="22" fill="#1e1e1e" font-weight="bold">Generational ZGC (JDK 21+) — Weak Hypothesis를 ZGC에</text>
  <text x="30" y="62" font-size="13" fill="#666">단명 객체를 따로 처리해 throughput + footprint 개선. -XX:+UseZGC -XX:+ZGenerational</text>

  <!-- Before/After -->
  <rect x="30" y="90" width="560" height="490" rx="10" ry="10" stroke="#c62828" fill="#ffcdd2" stroke-width="2"/>
  <text x="310" y="118" font-size="16" fill="#c62828" text-anchor="middle" font-weight="bold">단일 세대 ZGC (JDK 11~20)</text>

  <text x="50" y="148" font-size="12" fill="#c62828" font-weight="bold">구조:</text>
  <text x="60" y="168" font-size="11" fill="#333">전체 Heap이 한 영역.</text>
  <text x="60" y="186" font-size="11" fill="#333">모든 객체가 같이 mark/relocate.</text>

  <text x="50" y="218" font-size="12" fill="#c62828" font-weight="bold">한계:</text>
  <text x="60" y="238" font-size="11" fill="#333">1. 단명 객체도 전체 Heap scan에 포함 → 비효율</text>
  <text x="60" y="256" font-size="11" fill="#333">2. Live ratio 평균값 사용 → 어느 영역도 최적 아님</text>
  <text x="60" y="274" font-size="11" fill="#333">3. Weak Generational Hypothesis 활용 못 함</text>
  <text x="60" y="292" font-size="11" fill="#333">4. Throughput G1 대비 15% 낮음 (큰 footprint 차이)</text>

  <rect x="50" y="320" width="520" height="200" stroke="#c62828" fill="#ffffff"/>
  <text x="60" y="345" font-size="12" fill="#c62828" font-weight="bold">실측 성능 (단일 세대):</text>
  <text x="60" y="368" font-size="11" fill="#333">• Throughput: G1 대비 85%</text>
  <text x="60" y="388" font-size="11" fill="#333">• Footprint: G1 대비 20% 큼</text>
  <text x="60" y="408" font-size="11" fill="#333">• STW: < 1ms ✅</text>
  <text x="60" y="428" font-size="11" fill="#333">• Heap 16TB까지 ✅</text>
  <text x="60" y="448" font-size="11" fill="#333">• Allocation rate 한계: ~1GB/s (마이크로서비스 OK)</text>

  <text x="60" y="490" font-size="11" fill="#c62828" font-style="italic">→ Latency 좋지만 throughput/footprint 비용</text>

  <!-- Generational ZGC -->
  <rect x="620" y="90" width="550" height="490" rx="10" ry="10" stroke="#2e7d32" fill="#e8f5e9" stroke-width="2"/>
  <text x="895" y="118" font-size="16" fill="#2e7d32" text-anchor="middle" font-weight="bold">Generational ZGC (JDK 21+)</text>

  <text x="640" y="148" font-size="12" fill="#2e7d32" font-weight="bold">구조:</text>
  <text x="650" y="168" font-size="11" fill="#333">Heap을 Young + Old 분리.</text>
  <text x="650" y="186" font-size="11" fill="#333">Young GC + Old GC 별도 cycle.</text>
  <text x="650" y="204" font-size="11" fill="#333">둘 다 concurrent.</text>

  <text x="640" y="234" font-size="12" fill="#2e7d32" font-weight="bold">동작:</text>
  <text x="650" y="254" font-size="11" fill="#333">1. Young GC: 자주, 작은 영역만 mark/relocate</text>
  <text x="650" y="272" font-size="11" fill="#333">2. Old GC: 가끔, 살아남은 객체들만</text>
  <text x="650" y="290" font-size="11" fill="#333">3. Young 객체가 충분히 살면 Old로 promote</text>
  <text x="650" y="308" font-size="11" fill="#333">4. 둘 다 sub-ms STW</text>

  <rect x="640" y="335" width="510" height="225" stroke="#2e7d32" fill="#ffffff"/>
  <text x="650" y="358" font-size="12" fill="#2e7d32" font-weight="bold">실측 개선 (Generational, Oracle 발표):</text>
  <text x="650" y="380" font-size="11" fill="#333">• Throughput: G1과 동등 (단일 세대 대비 15% ↑)</text>
  <text x="650" y="400" font-size="11" fill="#333">• Footprint: G1과 동등 (단일 세대 대비 20% ↓)</text>
  <text x="650" y="420" font-size="11" fill="#333">• STW: < 1ms (유지)</text>
  <text x="650" y="440" font-size="11" fill="#333">• Allocation rate: ~수 GB/s</text>
  <text x="650" y="460" font-size="11" fill="#333">• CPU overhead 감소 (단명 객체 효율)</text>

  <text x="650" y="490" font-size="11" fill="#2e7d32" font-weight="bold">옵션:</text>
  <text x="650" y="510" font-size="11" fill="#333" font-family="monospace">-XX:+UseZGC -XX:+ZGenerational</text>
  <text x="650" y="540" font-size="11" fill="#2e7d32" font-style="italic">→ 차세대 default 가능성 (G1 대체 후보)</text>
</svg>
