<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" width="1200" height="720" font-family="-apple-system,BlinkMacSystemFont,'Apple SD Gothic Neo','Pretendard','Noto Sans KR','Malgun Gothic','Helvetica Neue',Helvetica,Arial,sans-serif">
  <rect x="0" y="0" width="1200" height="720" fill="#ffffff"/>
  <text x="30" y="40" font-size="22" fill="#1e1e1e" font-weight="bold">ZGC + Shenandoah — sub-ms STW의 GC</text>
  <text x="30" y="62" font-size="13" fill="#666">Concurrent Mark + Concurrent Evacuation. Read Barrier로 mutator와 동시 객체 이동.</text>

  <!-- ZGC -->
  <rect x="30" y="90" width="555" height="620" rx="10" ry="10" stroke="#1565c0" fill="#e3f2fd" stroke-width="2"/>
  <text x="307" y="118" font-size="16" fill="#1565c0" text-anchor="middle" font-weight="bold">ZGC (Oracle, JDK 11+)</text>

  <text x="50" y="148" font-size="12" fill="#1565c0" font-weight="bold">Colored Pointer (가장 큰 혁신):</text>
  <rect x="50" y="158" width="520" height="120" stroke="#1565c0" fill="#ffffff"/>
  <text x="60" y="178" font-size="11" fill="#333">64-bit pointer의 고위 비트에 색(state) 인코딩:</text>
  <text x="60" y="196" font-size="11" fill="#333" font-family="monospace">  [marked0:1][marked1:1][remapped:1][finalizable:1][...] [실제 주소:44bits]</text>
  <text x="60" y="218" font-size="11" fill="#333">각 비트가 GC 상태를 나타냄:</text>
  <text x="60" y="234" font-size="11" fill="#333">  • marked0/1: 현재/이전 marking cycle에 marked?</text>
  <text x="60" y="250" font-size="11" fill="#333">  • remapped: 객체가 이동했고 새 주소로 forwarding?</text>
  <text x="60" y="268" font-size="11" fill="#1565c0" font-style="italic">→ 별도 mark bitmap 불필요. ref 자체에 정보.</text>

  <text x="50" y="298" font-size="12" fill="#1565c0" font-weight="bold">Multi-mapping Memory:</text>
  <rect x="50" y="308" width="520" height="100" stroke="#1565c0" fill="#ffffff"/>
  <text x="60" y="328" font-size="11" fill="#333">한 물리 페이지를 3개 가상 주소에 mapping:</text>
  <text x="60" y="346" font-size="11" fill="#333">  • marked0_view, marked1_view, remapped_view</text>
  <text x="60" y="364" font-size="11" fill="#333">포인터 색에 따라 어느 view로 접근.</text>
  <text x="60" y="386" font-size="11" fill="#c62828">→ pmap이 RSS의 3배로 보고 (정상 — 물리는 1배)</text>

  <text x="50" y="430" font-size="12" fill="#1565c0" font-weight="bold">Load Reference Barrier (LRB):</text>
  <rect x="50" y="440" width="520" height="100" stroke="#1565c0" fill="#ffffff"/>
  <text x="60" y="460" font-size="11" fill="#333">매 ref 읽기에 inline 코드 (Read Barrier):</text>
  <text x="60" y="478" font-size="11" fill="#333" font-family="monospace">  if (ptr_color != expected) call slow_path;</text>
  <text x="60" y="498" font-size="11" fill="#333">slow_path가 객체 이동, ref 갱신.</text>
  <text x="60" y="518" font-size="11" fill="#1565c0" font-style="italic">→ Concurrent evacuation 가능 (객체 이동 중에도 mutator 진행)</text>

  <text x="50" y="558" font-size="12" fill="#1565c0" font-weight="bold">결과:</text>
  <text x="60" y="578" font-size="11" fill="#333">• STW: &lt; 1ms (보통 ~0.1ms)</text>
  <text x="60" y="598" font-size="11" fill="#333">• Heap: 16TB까지 (JDK 21)</text>
  <text x="60" y="618" font-size="11" fill="#333">• Throughput: G1 대비 5~15% ↓</text>
  <text x="60" y="638" font-size="11" fill="#333">• Read barrier 비용: 매 ref 읽기 ~2~5%</text>
  <text x="60" y="664" font-size="11" fill="#1565c0" font-weight="bold">옵션: -XX:+UseZGC</text>

  <!-- Shenandoah -->
  <rect x="615" y="90" width="555" height="620" rx="10" ry="10" stroke="#d84315" fill="#fff3e0" stroke-width="2"/>
  <text x="892" y="118" font-size="16" fill="#d84315" text-anchor="middle" font-weight="bold">Shenandoah (Red Hat, JDK 12+)</text>

  <text x="635" y="148" font-size="12" fill="#d84315" font-weight="bold">Brooks Pointer (옛 버전, JDK 12~14):</text>
  <rect x="635" y="158" width="520" height="100" stroke="#d84315" fill="#ffffff"/>
  <text x="645" y="178" font-size="11" fill="#333">각 객체 헤더에 forwarding pointer 추가:</text>
  <text x="645" y="196" font-size="11" fill="#333" font-family="monospace">  [forward_ptr][mark_word][klass_ptr][fields]</text>
  <text x="645" y="216" font-size="11" fill="#333">평상시: forward_ptr = self.</text>
  <text x="645" y="234" font-size="11" fill="#333">이동 시: forward_ptr → 새 주소.</text>
  <text x="645" y="252" font-size="11" fill="#c62828">→ 객체당 8 byte 추가 메모리</text>

  <text x="635" y="282" font-size="12" fill="#d84315" font-weight="bold">Load Reference Barrier (JDK 15+):</text>
  <rect x="635" y="292" width="520" height="120" stroke="#d84315" fill="#ffffff"/>
  <text x="645" y="312" font-size="11" fill="#333">Brooks pointer 제거. ZGC와 유사한 LRB 도입.</text>
  <text x="645" y="330" font-size="11" fill="#333">매 ref 읽기에 barrier 코드.</text>
  <text x="645" y="348" font-size="11" fill="#333" font-family="monospace">  if (in_collection_set(ptr)) call slow_path;</text>
  <text x="645" y="366" font-size="11" fill="#333">collection set은 evacuation 중인 region들.</text>
  <text x="645" y="386" font-size="11" fill="#d84315" font-style="italic">→ 객체 헤더 변경 없음 (Java 객체 표준 layout)</text>
  <text x="645" y="404" font-size="11" fill="#d84315" font-style="italic">  Lilliput 같은 다른 변화와 호환</text>

  <text x="635" y="438" font-size="12" fill="#d84315" font-weight="bold">Phase:</text>
  <rect x="635" y="448" width="520" height="135" stroke="#d84315" fill="#ffffff"/>
  <text x="645" y="468" font-size="11" fill="#333">1. Init Mark (STW, 짧음)</text>
  <text x="645" y="486" font-size="11" fill="#333">2. Concurrent Mark</text>
  <text x="645" y="504" font-size="11" fill="#333">3. Final Mark (STW, 짧음)</text>
  <text x="645" y="522" font-size="11" fill="#333">4. Concurrent Cleanup</text>
  <text x="645" y="540" font-size="11" fill="#333">5. Concurrent Evacuation (★ 이동 중에도 mutator 진행)</text>
  <text x="645" y="558" font-size="11" fill="#333">6. Init Update Refs (STW, 짧음)</text>
  <text x="645" y="576" font-size="11" fill="#333">7. Concurrent Update Refs (옛 ref → 새 ref 갱신)</text>

  <text x="635" y="610" font-size="12" fill="#d84315" font-weight="bold">결과:</text>
  <text x="645" y="630" font-size="11" fill="#333">• STW: ~10ms (ZGC보다 약간 김)</text>
  <text x="645" y="648" font-size="11" fill="#333">• Heap: 수십 ~ 수백 GB</text>
  <text x="645" y="666" font-size="11" fill="#333">• Throughput: G1 대비 약간 ↓</text>
  <text x="645" y="692" font-size="11" fill="#d84315" font-weight="bold">옵션: -XX:+UseShenandoahGC</text>
</svg>
