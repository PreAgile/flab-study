<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 700" width="1200" height="700" font-family="-apple-system,BlinkMacSystemFont,'Apple SD Gothic Neo','Pretendard','Noto Sans KR','Malgun Gothic','Helvetica Neue',Helvetica,Arial,sans-serif">
  <rect x="0" y="0" width="1200" height="700" fill="#ffffff"/>
  <text x="30" y="40" font-size="22" fill="#1e1e1e" font-weight="bold">Heap + TLAB — 객체 할당의 fast path</text>
  <text x="30" y="62" font-size="13" fill="#666">Young (Eden+S0+S1) + Old. TLAB은 lock-free bump-the-pointer.</text>

  <rect x="30" y="90" width="1140" height="170" rx="10" stroke="#1565c0" fill="#e3f2fd" stroke-width="2"/>
  <text x="600" y="115" font-size="14" fill="#1565c0" text-anchor="middle" font-weight="bold">Heap Layout</text>
  <rect x="60" y="135" width="650" height="100" stroke="#fbc02d" fill="#fff9c4" stroke-width="1.5"/>
  <text x="385" y="160" font-size="13" fill="#f57f17" text-anchor="middle" font-weight="bold">Young Generation (~33%)</text>
  <rect x="80" y="170" width="460" height="50" stroke="#ef6c00" fill="#ffe0b2"/>
  <text x="310" y="200" font-size="12" fill="#bf360c" text-anchor="middle">Eden (80%, TLAB들이 여기 위치)</text>
  <rect x="550" y="170" width="75" height="50" stroke="#7b1fa2" fill="#f3e5f5"/>
  <text x="588" y="200" font-size="11" fill="#4a148c" text-anchor="middle">S0 (10%)</text>
  <rect x="635" y="170" width="75" height="50" stroke="#7b1fa2" fill="#f3e5f5"/>
  <text x="673" y="200" font-size="11" fill="#4a148c" text-anchor="middle">S1 (10%)</text>

  <rect x="730" y="135" width="430" height="100" stroke="#c62828" fill="#ffcdd2" stroke-width="1.5"/>
  <text x="945" y="160" font-size="13" fill="#b71c1c" text-anchor="middle" font-weight="bold">Old Generation (~67%)</text>
  <text x="945" y="190" font-size="11" fill="#333" text-anchor="middle">tenured 객체들. Major/Full GC 대상</text>
  <text x="945" y="210" font-size="11" fill="#333" text-anchor="middle">G1: Humongous region (≥ 50% region size)</text>

  <!-- TLAB zoom -->
  <rect x="30" y="285" width="555" height="395" rx="10" stroke="#ef6c00" fill="#fff3e0" stroke-width="2"/>
  <text x="307" y="310" font-size="14" fill="#ef6c00" text-anchor="middle" font-weight="bold">TLAB 줌인 (Thread-Local Allocation Buffer)</text>

  <text x="50" y="335" font-size="11" fill="#333">Eden 안에서 각 thread가 자기만의 작은 영역 받음.</text>
  <text x="50" y="353" font-size="11" fill="#333">크기: ~64KB ~ 수 MB (JVM 자동 조정).</text>
  <rect x="50" y="365" width="520" height="60" stroke="#ef6c00" fill="#ffffff"/>
  <text x="60" y="385" font-size="11" fill="#333" font-family="monospace">|--할당된 객체들--|---free---|</text>
  <text x="60" y="402" font-size="11" fill="#333" font-family="monospace">start         top         end</text>
  <text x="60" y="418" font-size="11" fill="#666">bump pointer (top) — 3 instruction 할당</text>

  <text x="50" y="448" font-size="12" fill="#ef6c00" font-weight="bold">Fast path 할당 (~3 cycles):</text>
  <rect x="50" y="458" width="520" height="100" stroke="#ef6c00" fill="#ffffff"/>
  <text x="60" y="478" font-size="11" fill="#333" font-family="monospace">  obj = top;</text>
  <text x="60" y="496" font-size="11" fill="#333" font-family="monospace">  new_top = top + size;</text>
  <text x="60" y="514" font-size="11" fill="#333" font-family="monospace">  if (new_top &lt;= end) {</text>
  <text x="60" y="532" font-size="11" fill="#333" font-family="monospace">    top = new_top;</text>
  <text x="60" y="550" font-size="11" fill="#333" font-family="monospace">    return obj;   // ★ lock-free</text>

  <text x="50" y="585" font-size="11" fill="#ef6c00" font-weight="bold">TLAB 가득 시 2가지 경로:</text>
  <text x="60" y="605" font-size="11" fill="#333">A. Retire & Refill (남은 공간 큼)</text>
  <text x="70" y="623" font-size="10" fill="#666">  filler object로 채움 + 새 TLAB</text>
  <text x="60" y="643" font-size="11" fill="#333">B. Slow path (남은 공간 작음)</text>
  <text x="70" y="661" font-size="10" fill="#666">  Eden에 직접 할당 (lock/CAS)</text>

  <!-- Object header -->
  <rect x="615" y="285" width="555" height="395" rx="10" stroke="#7b1fa2" fill="#f3e5f5" stroke-width="2"/>
  <text x="892" y="310" font-size="14" fill="#7b1fa2" text-anchor="middle" font-weight="bold">Object Header (객체의 정체)</text>

  <rect x="635" y="335" width="515" height="60" stroke="#7b1fa2" fill="#ffffff"/>
  <text x="892" y="358" font-size="12" fill="#7b1fa2" text-anchor="middle" font-weight="bold">[Mark Word (8B)][Klass Ptr (4B)][Fields...]</text>
  <text x="892" y="378" font-size="10" fill="#666" text-anchor="middle">12 byte 헤더 + fields. (Compressed Klass 활성)</text>

  <text x="635" y="415" font-size="12" fill="#7b1fa2" font-weight="bold">Mark Word 상태:</text>
  <rect x="635" y="425" width="515" height="170" stroke="#7b1fa2" fill="#ffffff"/>
  <text x="645" y="445" font-size="11" fill="#333">Unlocked:    [hash:31][age:4][lock:01]</text>
  <text x="645" y="463" font-size="11" fill="#333">Biased:      [thread_id][age:4][biased:1][lock:01]</text>
  <text x="645" y="481" font-size="11" fill="#333">Lightweight: [lock_record_ptr:62][lock:00]</text>
  <text x="645" y="499" font-size="11" fill="#333">Heavyweight: [monitor_ptr:62][lock:10]</text>
  <text x="645" y="517" font-size="11" fill="#333">GC marked:   [forwarding_ptr:62][mark:11]</text>

  <text x="645" y="545" font-size="11" fill="#7b1fa2" font-weight="bold">JDK 15+ Biased deprecated (JEP 374)</text>
  <text x="645" y="563" font-size="11" fill="#7b1fa2" font-weight="bold">Project Lilliput: Mark Word 8 bit 압축 진행 중</text>

  <text x="635" y="610" font-size="12" fill="#7b1fa2" font-weight="bold">Compressed Oops (32GB 미만):</text>
  <text x="645" y="628" font-size="11" fill="#333">실제 주소 = base + (compressed_oop &lt;&lt; 3)</text>
  <text x="645" y="646" font-size="11" fill="#333">메모리 30% ↓. Heap 32GB 초과 시 자동 비활성.</text>
  <text x="645" y="666" font-size="11" fill="#c62828">→ "32GB의 벽" — 31GB가 32GB보다 효율적</text>
</svg>
