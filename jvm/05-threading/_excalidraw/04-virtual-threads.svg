<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 700" width="1200" height="700" font-family="-apple-system,BlinkMacSystemFont,'Apple SD Gothic Neo','Pretendard','Noto Sans KR','Malgun Gothic','Helvetica Neue',Helvetica,Arial,sans-serif">
  <rect x="0" y="0" width="1200" height="700" fill="#ffffff"/>
  <text x="30" y="40" font-size="22" fill="#1e1e1e" font-weight="bold">Virtual Threads + Loom (JDK 21+)</text>
  <text x="30" y="62" font-size="13" fill="#666">M virtual : N carrier (OS) thread. Continuation freeze/thaw. Pinning 함정.</text>

  <!-- Model -->
  <rect x="30" y="90" width="555" height="290" rx="10" ry="10" stroke="#1565c0" fill="#e3f2fd" stroke-width="2"/>
  <text x="307" y="115" font-size="14" fill="#1565c0" text-anchor="middle" font-weight="bold">M:N Model</text>

  <text x="50" y="145" font-size="12" fill="#1565c0">Virtual Thread = Java 객체 (Heap)</text>
  <rect x="50" y="155" width="100" height="40" stroke="#1565c0" fill="#bbdefb"/>
  <text x="100" y="180" font-size="11" fill="#333" text-anchor="middle">VT-1</text>
  <rect x="160" y="155" width="100" height="40" stroke="#1565c0" fill="#bbdefb"/>
  <text x="210" y="180" font-size="11" fill="#333" text-anchor="middle">VT-2</text>
  <rect x="270" y="155" width="100" height="40" stroke="#1565c0" fill="#bbdefb"/>
  <text x="320" y="180" font-size="11" fill="#333" text-anchor="middle">VT-3 ...</text>
  <text x="395" y="180" font-size="11" fill="#333">M개 (수십만 가능)</text>

  <text x="50" y="220" font-size="12" fill="#1565c0">Carrier Thread = ForkJoinPool worker</text>
  <rect x="50" y="230" width="150" height="40" stroke="#c62828" fill="#ffcdd2"/>
  <text x="125" y="255" font-size="11" fill="#333" text-anchor="middle">Carrier-1 (OS)</text>
  <rect x="210" y="230" width="150" height="40" stroke="#c62828" fill="#ffcdd2"/>
  <text x="285" y="255" font-size="11" fill="#333" text-anchor="middle">Carrier-2 (OS)</text>
  <text x="370" y="255" font-size="11" fill="#333">N개 (CPU 코어 수)</text>

  <text x="50" y="295" font-size="12" fill="#1565c0" font-weight="bold">스케줄링:</text>
  <text x="50" y="313" font-size="11" fill="#333">• VT가 blocking 호출 시 carrier에서 freeze (stack chunk → Heap)</text>
  <text x="50" y="331" font-size="11" fill="#333">• Carrier가 다른 VT 실행</text>
  <text x="50" y="349" font-size="11" fill="#333">• I/O 완료 시 VT를 carrier에 thaw (Heap → stack)</text>
  <text x="50" y="367" font-size="11" fill="#1565c0" font-style="italic">→ blocking I/O 코드를 비동기처럼 처리</text>

  <!-- Continuation -->
  <rect x="615" y="90" width="555" height="290" rx="10" ry="10" stroke="#2e7d32" fill="#e8f5e9" stroke-width="2"/>
  <text x="892" y="115" font-size="14" fill="#2e7d32" text-anchor="middle" font-weight="bold">Continuation (freeze / thaw)</text>

  <text x="635" y="145" font-size="12" fill="#2e7d32" font-weight="bold">Freeze (VT blocking I/O):</text>
  <text x="635" y="163" font-size="11" fill="#333">1. VT의 stack frame들을 stack chunk로 복사</text>
  <text x="635" y="181" font-size="11" fill="#333">2. Heap에 jdk.internal.vm.StackChunk 객체로 저장</text>
  <text x="635" y="199" font-size="11" fill="#333">3. Carrier의 OS stack은 비움</text>
  <text x="635" y="217" font-size="11" fill="#333">4. Carrier가 다른 VT 실행 시작</text>

  <text x="635" y="245" font-size="12" fill="#2e7d32" font-weight="bold">Thaw (I/O 완료, VT 재개):</text>
  <text x="635" y="263" font-size="11" fill="#333">1. 스케줄러가 VT를 어느 carrier에 할당</text>
  <text x="635" y="281" font-size="11" fill="#333">2. Stack chunk를 carrier의 OS stack에 복원</text>
  <text x="635" y="299" font-size="11" fill="#333">3. VT가 blocking 호출 다음 줄부터 재개</text>

  <text x="635" y="328" font-size="11" fill="#2e7d32" font-weight="bold">비용:</text>
  <text x="635" y="346" font-size="11" fill="#333">• Freeze/Thaw: ~수 us (vs OS context switch ~ 수 us)</text>
  <text x="635" y="364" font-size="11" fill="#333">• Stack chunk 메모리: 실제 깊이만 (vs platform thread 1MB)</text>

  <!-- Pinning -->
  <rect x="30" y="395" width="1140" height="290" rx="10" ry="10" stroke="#c62828" fill="#ffcdd2" stroke-width="2"/>
  <text x="600" y="420" font-size="14" fill="#c62828" text-anchor="middle" font-weight="bold">Pinning — VT의 가장 큰 함정</text>

  <text x="50" y="450" font-size="12" fill="#c62828" font-weight="bold">Pinning이란:</text>
  <text x="50" y="468" font-size="11" fill="#333">VT가 carrier에서 freeze 못 함 → carrier도 같이 block → 다른 VT 실행 불가</text>

  <text x="50" y="498" font-size="12" fill="#c62828" font-weight="bold">트리거:</text>
  <rect x="50" y="508" width="540" height="160" stroke="#c62828" fill="#ffffff"/>
  <text x="60" y="528" font-size="11" fill="#333">1. <tspan font-weight="bold">synchronized 안의 blocking 호출</tspan> (JDK 21~23)</text>
  <text x="60" y="545" font-size="11" fill="#666" font-family="monospace">   synchronized(lock) { socket.read(); }   ← pinning</text>
  <text x="60" y="568" font-size="11" fill="#333">2. <tspan font-weight="bold">native (JNI) 호출 중인 동안</tspan></text>
  <text x="60" y="585" font-size="11" fill="#666">   JNI 함수가 OS stack에 의존 → freeze 불가</text>
  <text x="60" y="608" font-size="11" fill="#333">3. <tspan font-weight="bold">일부 deeply nested call</tspan> (edge cases)</text>
  <text x="60" y="625" font-size="11" fill="#666">   매우 깊은 reflection chain 등</text>
  <text x="60" y="650" font-size="11" fill="#1565c0">JDK 24+ (JEP 491): synchronized pinning 제거 예정</text>

  <text x="615" y="498" font-size="12" fill="#c62828" font-weight="bold">해결:</text>
  <rect x="615" y="508" width="540" height="160" stroke="#c62828" fill="#ffffff"/>
  <text x="625" y="528" font-size="11" fill="#333">1. <tspan font-weight="bold">synchronized → ReentrantLock</tspan></text>
  <text x="625" y="545" font-size="11" fill="#666" font-family="monospace">   lock.lock(); try { socket.read(); } finally { lock.unlock(); }</text>
  <text x="625" y="568" font-size="11" fill="#333">2. <tspan font-weight="bold">진단</tspan>: -Djdk.tracePinnedThreads=full</text>
  <text x="625" y="585" font-size="11" fill="#666">   JFR jdk.VirtualThreadPinned 이벤트</text>
  <text x="625" y="608" font-size="11" fill="#333">3. <tspan font-weight="bold">CPU-bound 작업은 platform thread</tspan></text>
  <text x="625" y="625" font-size="11" fill="#666">   VT는 I/O-bound만</text>
  <text x="625" y="650" font-size="11" fill="#333">4. <tspan font-weight="bold">JDK 24+ 업그레이드</tspan> (synchronized pinning 해제)</text>
</svg>
