<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 820" width="1200" height="820" font-family="-apple-system,BlinkMacSystemFont,'Apple SD Gothic Neo','Pretendard','Noto Sans KR','Malgun Gothic','Helvetica Neue',Helvetica,Arial,sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerUnits="strokeWidth" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#1e1e1e"/>
    </marker>
  </defs>
  <rect x="0" y="0" width="1200" height="820" fill="#ffffff"/>
  <text x="30" y="40" font-size="24" fill="#1e1e1e" font-weight="bold">C1 vs C2 — IR 구조와 phase 순서</text>
  <text x="30" y="63" font-size="13" fill="#666">C1: HIR → LIR (CFG 기반, 빠른 컴파일). C2: Sea-of-Nodes (data+control 통합 그래프, 공격적 최적화).</text>

  <!-- C1 column -->
  <rect x="30" y="90" width="555" height="700" rx="10" ry="10" stroke="#d84315" fill="#fff3e0" stroke-width="2"/>
  <text x="307" y="120" font-size="18" fill="#d84315" text-anchor="middle" font-weight="bold">C1 (Client Compiler)</text>
  <text x="307" y="140" font-size="11" fill="#666" text-anchor="middle">src/hotspot/share/c1</text>

  <!-- C1 phases -->
  <rect x="60" y="160" width="495" height="50" rx="6" ry="6" stroke="#d84315" fill="#ffffff" stroke-width="1"/>
  <text x="307" y="178" font-size="13" fill="#d84315" text-anchor="middle" font-weight="bold">① bytecode parsing</text>
  <text x="307" y="198" font-size="11" fill="#333" text-anchor="middle">GraphBuilder가 bytecode → HIR(High-level IR)</text>

  <path d="M 307,210 L 307,225" stroke="#1e1e1e" stroke-width="2" fill="none" marker-end="url(#arrow)"/>

  <rect x="60" y="230" width="495" height="80" rx="6" ry="6" stroke="#d84315" fill="#ffffff" stroke-width="1"/>
  <text x="307" y="250" font-size="13" fill="#d84315" text-anchor="middle" font-weight="bold">② HIR optimization</text>
  <text x="80" y="270" font-size="11" fill="#333">• Local Common Subexpression Elimination</text>
  <text x="80" y="285" font-size="11" fill="#333">• Constant Folding, Dead Code Elimination</text>
  <text x="80" y="300" font-size="11" fill="#333">• 간단한 inlining (작은 메서드만)</text>

  <path d="M 307,310 L 307,325" stroke="#1e1e1e" stroke-width="2" fill="none" marker-end="url(#arrow)"/>

  <rect x="60" y="330" width="495" height="80" rx="6" ry="6" stroke="#d84315" fill="#ffffff" stroke-width="1"/>
  <text x="307" y="350" font-size="13" fill="#d84315" text-anchor="middle" font-weight="bold">③ HIR → LIR (Low-level IR)</text>
  <text x="80" y="370" font-size="11" fill="#333">• instruction selection (CPU별 native에 가까워짐)</text>
  <text x="80" y="385" font-size="11" fill="#333">• operand 형태 결정 (register vs memory)</text>
  <text x="80" y="400" font-size="11" fill="#333">• phi node 처리 (SSA 단순화)</text>

  <path d="M 307,410 L 307,425" stroke="#1e1e1e" stroke-width="2" fill="none" marker-end="url(#arrow)"/>

  <rect x="60" y="430" width="495" height="60" rx="6" ry="6" stroke="#d84315" fill="#ffffff" stroke-width="1"/>
  <text x="307" y="450" font-size="13" fill="#d84315" text-anchor="middle" font-weight="bold">④ Linear Scan Register Allocation</text>
  <text x="307" y="470" font-size="11" fill="#333" text-anchor="middle">빠른 register allocator (graph coloring보다 단순, 약간 덜 최적)</text>

  <path d="M 307,490 L 307,505" stroke="#1e1e1e" stroke-width="2" fill="none" marker-end="url(#arrow)"/>

  <rect x="60" y="510" width="495" height="50" rx="6" ry="6" stroke="#d84315" fill="#ffffff" stroke-width="1"/>
  <text x="307" y="528" font-size="13" fill="#d84315" text-anchor="middle" font-weight="bold">⑤ Code Emission</text>
  <text x="307" y="548" font-size="11" fill="#333" text-anchor="middle">native instruction 생성 → nmethod → Code Cache (Profiled)</text>

  <!-- C1 properties -->
  <rect x="60" y="585" width="495" height="195" rx="6" ry="6" stroke="#d84315" fill="#ffe0b2" stroke-width="1"/>
  <text x="307" y="605" font-size="13" fill="#d84315" text-anchor="middle" font-weight="bold">C1의 특성</text>
  <text x="80" y="625" font-size="11" fill="#333">• IR: HIR + LIR (CFG 기반, basic block 명시)</text>
  <text x="80" y="643" font-size="11" fill="#333">• 컴파일 시간: ~수 ms / 메서드</text>
  <text x="80" y="661" font-size="11" fill="#333">• 최적화 수준: 약함 (constant fold, 단순 inline)</text>
  <text x="80" y="679" font-size="11" fill="#333">• Profile 수집 명령 inline (Tier 3)</text>
  <text x="80" y="697" font-size="11" fill="#333">• 결과 성능: 인터프리터의 ~10~30배, C2의 ~50%</text>
  <text x="80" y="715" font-size="11" fill="#333">• 코드 크기: ~3,000줄 (C++) — 비교적 단순</text>
  <text x="80" y="733" font-size="11" fill="#333">• 유지보수 쉬움 (Sun이 1999년 작성)</text>
  <text x="80" y="755" font-size="11" fill="#d84315" font-style="italic">→ "충분히 빠른 baseline + profile 수집기"</text>
  <text x="80" y="773" font-size="11" fill="#d84315" font-style="italic">  C2의 정확한 profile 입력을 만드는 역할이 가장 중요</text>

  <!-- C2 column -->
  <rect x="615" y="90" width="555" height="700" rx="10" ry="10" stroke="#c62828" fill="#ffcdd2" stroke-width="2"/>
  <text x="892" y="120" font-size="18" fill="#c62828" text-anchor="middle" font-weight="bold">C2 (Server Compiler)</text>
  <text x="892" y="140" font-size="11" fill="#666" text-anchor="middle">src/hotspot/share/opto — "Optimizing compiler"</text>

  <!-- C2 phases -->
  <rect x="645" y="160" width="495" height="50" rx="6" ry="6" stroke="#c62828" fill="#ffffff" stroke-width="1"/>
  <text x="892" y="178" font-size="13" fill="#c62828" text-anchor="middle" font-weight="bold">① Parse — bytecode → Sea-of-Nodes</text>
  <text x="892" y="198" font-size="11" fill="#333" text-anchor="middle">data + control node가 한 그래프에 (basic block 명시 안 함)</text>

  <path d="M 892,210 L 892,225" stroke="#1e1e1e" stroke-width="2" fill="none" marker-end="url(#arrow)"/>

  <rect x="645" y="230" width="495" height="60" rx="6" ry="6" stroke="#c62828" fill="#ffffff" stroke-width="1"/>
  <text x="892" y="250" font-size="13" fill="#c62828" text-anchor="middle" font-weight="bold">② IterGVN (Iterative Global Value Numbering)</text>
  <text x="665" y="270" font-size="11" fill="#333">• 같은 값을 계산하는 노드를 통합 (CSE의 강력 버전)</text>
  <text x="665" y="285" font-size="11" fill="#333">• Constant folding을 fixpoint까지 반복</text>

  <path d="M 892,290 L 892,305" stroke="#1e1e1e" stroke-width="2" fill="none" marker-end="url(#arrow)"/>

  <rect x="645" y="310" width="495" height="60" rx="6" ry="6" stroke="#c62828" fill="#ffffff" stroke-width="1"/>
  <text x="892" y="330" font-size="13" fill="#c62828" text-anchor="middle" font-weight="bold">③ Inlining + Escape Analysis</text>
  <text x="665" y="350" font-size="11" fill="#333">• inlining: 호출 사이트의 callee를 caller에 펼침</text>
  <text x="665" y="365" font-size="11" fill="#333">• EA: 객체가 메서드 밖으로 escape하는지 분석 → Scalar Replacement</text>

  <path d="M 892,370 L 892,385" stroke="#1e1e1e" stroke-width="2" fill="none" marker-end="url(#arrow)"/>

  <rect x="645" y="390" width="495" height="80" rx="6" ry="6" stroke="#c62828" fill="#ffffff" stroke-width="1"/>
  <text x="892" y="410" font-size="13" fill="#c62828" text-anchor="middle" font-weight="bold">④ Loop optimizations</text>
  <text x="665" y="430" font-size="11" fill="#333">• Loop Unrolling, Loop Invariant Code Motion</text>
  <text x="665" y="445" font-size="11" fill="#333">• Range Check Elimination</text>
  <text x="665" y="460" font-size="11" fill="#333">• SuperWord (SIMD vectorization)</text>

  <path d="M 892,470 L 892,485" stroke="#1e1e1e" stroke-width="2" fill="none" marker-end="url(#arrow)"/>

  <rect x="645" y="490" width="495" height="50" rx="6" ry="6" stroke="#c62828" fill="#ffffff" stroke-width="1"/>
  <text x="892" y="508" font-size="13" fill="#c62828" text-anchor="middle" font-weight="bold">⑤ Macro Expand + CCP + Scheduling</text>
  <text x="892" y="528" font-size="11" fill="#333" text-anchor="middle">사용자 정의 매크로 펼침 + 노드 배치 (어느 basic block에 둘지 결정)</text>

  <path d="M 892,540 L 892,555" stroke="#1e1e1e" stroke-width="2" fill="none" marker-end="url(#arrow)"/>

  <rect x="645" y="560" width="495" height="50" rx="6" ry="6" stroke="#c62828" fill="#ffffff" stroke-width="1"/>
  <text x="892" y="578" font-size="13" fill="#c62828" text-anchor="middle" font-weight="bold">⑥ Register Allocation (graph coloring)</text>
  <text x="892" y="598" font-size="11" fill="#333" text-anchor="middle">graph coloring 기반 — 최적이지만 느림. NP-hard 휴리스틱.</text>

  <path d="M 892,610 L 892,625" stroke="#1e1e1e" stroke-width="2" fill="none" marker-end="url(#arrow)"/>

  <rect x="645" y="630" width="495" height="40" rx="6" ry="6" stroke="#c62828" fill="#ffffff" stroke-width="1"/>
  <text x="892" y="655" font-size="13" fill="#c62828" text-anchor="middle" font-weight="bold">⑦ Output — nmethod → Code Cache (Non-profiled)</text>

  <!-- C2 properties -->
  <rect x="645" y="685" width="495" height="95" rx="6" ry="6" stroke="#c62828" fill="#ffcdd2" stroke-width="1"/>
  <text x="892" y="705" font-size="13" fill="#c62828" text-anchor="middle" font-weight="bold">C2의 특성</text>
  <text x="665" y="722" font-size="11" fill="#333">• IR: Sea-of-Nodes (Cliff Click 1995, data+control 한 그래프)</text>
  <text x="665" y="737" font-size="11" fill="#333">• 컴파일 시간: ~수십~수백 ms / 메서드 (C1의 10~50×)</text>
  <text x="665" y="752" font-size="11" fill="#333">• 코드 크기: ~50,000줄 (C++) — 거대, 어렵</text>
  <text x="665" y="768" font-size="11" fill="#c62828" font-style="italic">→ "공격적 speculation으로 peak 성능. Deopt가 안전판."</text>
</svg>
