<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 760" width="1200" height="760" font-family="-apple-system,BlinkMacSystemFont,'Apple SD Gothic Neo','Pretendard','Noto Sans KR','Malgun Gothic','Helvetica Neue',Helvetica,Arial,sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerUnits="strokeWidth" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#1e1e1e"/>
    </marker>
    <marker id="arrow-red" viewBox="0 0 10 10" refX="9" refY="5" markerUnits="strokeWidth" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#c62828"/>
    </marker>
  </defs>
  <rect x="0" y="0" width="1200" height="760" fill="#ffffff"/>

  <!-- Title -->
  <text x="30" y="40" font-size="26" fill="#1e1e1e" font-weight="bold">JVM Execution Engine — Bytecode → Native Code 흐름</text>
  <text x="30" y="65" font-size="14" fill="#666">Interpreter ⇄ Tiered Compilation (C1/C2) ⇄ Code Cache, OSR + Deoptimization</text>

  <!-- Input: Bytecode -->
  <rect x="30" y="100" width="200" height="80" rx="10" ry="10" stroke="#2e7d32" fill="#e8f5e9" stroke-width="2"/>
  <text x="130" y="135" font-size="16" fill="#1b5e20" text-anchor="middle" font-weight="bold">Bytecode</text>
  <text x="130" y="158" font-size="12" fill="#1b5e20" text-anchor="middle">.class → InstanceKlass</text>

  <!-- Template Interpreter -->
  <rect x="300" y="100" width="240" height="200" rx="10" ry="10" stroke="#ef6c00" fill="#fff3e0" stroke-width="2"/>
  <text x="420" y="130" font-size="16" fill="#ef6c00" text-anchor="middle" font-weight="bold">Tier 0: Template Interpreter</text>
  <text x="420" y="155" font-size="12" fill="#333" text-anchor="middle">opcode마다 native template</text>
  <text x="420" y="172" font-size="12" fill="#333" text-anchor="middle">switch interpreter보다 2~3배 빠름</text>
  <rect x="320" y="190" width="200" height="90" stroke="#ef6c00" fill="#ffe0b2" stroke-width="1" rx="4" ry="4"/>
  <text x="420" y="210" font-size="12" fill="#333" text-anchor="middle" font-weight="bold">Profile 수집 (MDO)</text>
  <text x="420" y="230" font-size="11" fill="#333" text-anchor="middle">호출 횟수, branch taken/not</text>
  <text x="420" y="248" font-size="11" fill="#333" text-anchor="middle">type profile (call site별)</text>
  <text x="420" y="266" font-size="11" fill="#333" text-anchor="middle">loop iteration count</text>

  <!-- Compile Queue -->
  <rect x="600" y="100" width="180" height="80" rx="10" ry="10" stroke="#283593" fill="#e8eaf6" stroke-width="2"/>
  <text x="690" y="130" font-size="14" fill="#283593" text-anchor="middle" font-weight="bold">Compile Broker</text>
  <text x="690" y="150" font-size="11" fill="#333" text-anchor="middle">CompileTask 우선순위 큐</text>
  <text x="690" y="167" font-size="11" fill="#333" text-anchor="middle">CompilerThread × N</text>

  <!-- C1 -->
  <rect x="600" y="220" width="180" height="100" rx="10" ry="10" stroke="#d84315" fill="#ffe0b2" stroke-width="2"/>
  <text x="690" y="245" font-size="14" fill="#d84315" text-anchor="middle" font-weight="bold">Tier 3: C1 (Client)</text>
  <text x="690" y="265" font-size="11" fill="#333" text-anchor="middle">HIR / LIR IR</text>
  <text x="690" y="282" font-size="11" fill="#333" text-anchor="middle">빠른 컴파일 (수 ms)</text>
  <text x="690" y="299" font-size="11" fill="#333" text-anchor="middle">profiling instrumented</text>

  <!-- C2 -->
  <rect x="600" y="360" width="180" height="100" rx="10" ry="10" stroke="#c62828" fill="#ffcdd2" stroke-width="2"/>
  <text x="690" y="385" font-size="14" fill="#c62828" text-anchor="middle" font-weight="bold">Tier 4: C2 (Server)</text>
  <text x="690" y="405" font-size="11" fill="#333" text-anchor="middle">Sea-of-Nodes IR</text>
  <text x="690" y="422" font-size="11" fill="#333" text-anchor="middle">공격적 최적화 (수십~수백 ms)</text>
  <text x="690" y="439" font-size="11" fill="#333" text-anchor="middle">EA, Inline, Loop, Speculate</text>

  <!-- Code Cache -->
  <rect x="850" y="100" width="320" height="380" rx="10" ry="10" stroke="#00695c" fill="#e0f2f1" stroke-width="2"/>
  <text x="1010" y="130" font-size="16" fill="#00695c" text-anchor="middle" font-weight="bold">Code Cache</text>
  <text x="1010" y="150" font-size="11" fill="#666" text-anchor="middle">기본 240MB, mmap exec</text>

  <rect x="870" y="170" width="280" height="80" rx="6" ry="6" stroke="#00695c" fill="#ffffff" stroke-width="1"/>
  <text x="1010" y="195" font-size="13" fill="#00695c" text-anchor="middle" font-weight="bold">Non-method (~5.7MB)</text>
  <text x="1010" y="215" font-size="11" fill="#333" text-anchor="middle">Interpreter loop, Adapter,</text>
  <text x="1010" y="232" font-size="11" fill="#333" text-anchor="middle">Runtime stub, Safepoint poll</text>

  <rect x="870" y="265" width="280" height="100" rx="6" ry="6" stroke="#d84315" fill="#ffffff" stroke-width="1"/>
  <text x="1010" y="290" font-size="13" fill="#d84315" text-anchor="middle" font-weight="bold">Profiled (~117MB)</text>
  <text x="1010" y="310" font-size="11" fill="#333" text-anchor="middle">C1 nmethod들</text>
  <text x="1010" y="328" font-size="11" fill="#333" text-anchor="middle">short-lived (C2로 승격)</text>
  <text x="1010" y="346" font-size="11" fill="#333" text-anchor="middle">Sweeper가 자주 청소</text>

  <rect x="870" y="380" width="280" height="100" rx="6" ry="6" stroke="#c62828" fill="#ffffff" stroke-width="1"/>
  <text x="1010" y="405" font-size="13" fill="#c62828" text-anchor="middle" font-weight="bold">Non-profiled (~117MB)</text>
  <text x="1010" y="425" font-size="11" fill="#333" text-anchor="middle">C2 nmethod들</text>
  <text x="1010" y="443" font-size="11" fill="#333" text-anchor="middle">long-lived, 가장 빠른 code</text>
  <text x="1010" y="461" font-size="11" fill="#333" text-anchor="middle">Sweeper 거의 안 함</text>

  <!-- Arrows -->
  <!-- bytecode → interpreter -->
  <path d="M 230,140 L 300,140" stroke="#1e1e1e" fill="none" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="265" y="130" font-size="11" fill="#333" text-anchor="middle">실행</text>

  <!-- interpreter → compile broker (호출 횟수 임계) -->
  <path d="M 540,140 L 600,140" stroke="#1e1e1e" fill="none" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="570" y="130" font-size="10" fill="#333" text-anchor="middle">~1500회</text>

  <!-- compile broker → C1 -->
  <path d="M 690,180 L 690,220" stroke="#1e1e1e" fill="none" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- C1 → C2 (승격) -->
  <path d="M 690,320 L 690,360" stroke="#1e1e1e" fill="none" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="720" y="343" font-size="10" fill="#333" text-anchor="start">~10000회 + profile</text>

  <!-- C1 → Code Cache (Profiled) -->
  <path d="M 780,270 L 870,315" stroke="#388e3c" fill="none" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- C2 → Code Cache (Non-profiled) -->
  <path d="M 780,410 L 870,430" stroke="#388e3c" fill="none" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Interpreter ↔ Code Cache (실행 위임) -->
  <path d="M 540,180 C 700,180 850,180 850,200" stroke="#1e1e1e" fill="none" stroke-width="1.5" stroke-dasharray="4 3" marker-end="url(#arrow)"/>
  <text x="700" y="170" font-size="10" fill="#666" text-anchor="middle">컴파일 후 entry patch</text>

  <!-- Deoptimization arrow -->
  <path d="M 870,430 C 600,560 400,500 300,250" stroke="#c62828" fill="none" stroke-width="2" stroke-dasharray="6 4" marker-end="url(#arrow-red)"/>
  <text x="500" y="610" font-size="13" fill="#c62828" text-anchor="middle" font-weight="bold">Deoptimization ★</text>
  <text x="500" y="628" font-size="11" fill="#c62828" text-anchor="middle">speculation 깨짐 → native frame → interpreter frame</text>
  <text x="500" y="645" font-size="11" fill="#c62828" text-anchor="middle">(CHA 위반, type 변경, uncommon branch)</text>

  <!-- OSR arrow -->
  <path d="M 420,300 L 690,360" stroke="#7b1fa2" fill="none" stroke-width="1.5" stroke-dasharray="4 3" marker-end="url(#arrow)"/>
  <text x="540" y="350" font-size="10" fill="#7b1fa2" text-anchor="middle" font-weight="bold">OSR (On-Stack Replacement)</text>
  <text x="540" y="365" font-size="10" fill="#7b1fa2" text-anchor="middle">long loop 중간 진입</text>

  <!-- Bottom legend -->
  <rect x="30" y="680" width="1140" height="65" rx="6" ry="6" stroke="#999" fill="#fafafa" stroke-width="1"/>
  <text x="50" y="703" font-size="12" fill="#333" font-weight="bold">핵심 관찰:</text>
  <text x="50" y="722" font-size="11" fill="#333">① Tier 0 → 3 → 4 점진적 승격. ② Profile은 Interpreter+C1에서 계속 수집되어 C2 결정에 사용. ③ C2가 가정 위반 시 deopt → Interpreter 복귀.</text>
  <text x="50" y="739" font-size="11" fill="#333">④ 모든 컴파일 결과는 Code Cache(별도 mmap exec 영역)에 저장. ⑤ OSR은 메서드 호출 안 거치고 loop 중간부터 native code 진입 가능.</text>
</svg>
