<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1300 600" width="1300" height="600" font-family="-apple-system,BlinkMacSystemFont,'Apple SD Gothic Neo','Pretendard','Noto Sans KR','Malgun Gothic','Helvetica Neue',Helvetica,Arial,sans-serif">
  <rect x="0" y="0" width="1300" height="600" fill="#ffffff"/>
  <text x="30" y="35" font-size="22" fill="#1e1e1e" font-weight="bold">Java LTS 마스터 타임라인 — 운영 관점</text>
  <text x="30" y="58" font-size="13" fill="#666">LTS만 표시 + 운영 영향 중심. 비-LTS는 stepping stone.</text>

  <!-- Horizontal timeline -->
  <line x1="50" y1="120" x2="1250" y2="120" stroke="#1e1e1e" stroke-width="2"/>

  <!-- Java 8 -->
  <circle cx="120" cy="120" r="10" fill="#1565c0"/>
  <text x="120" y="105" font-size="13" fill="#1565c0" text-anchor="middle" font-weight="bold">JDK 8 (2014)</text>
  <text x="120" y="145" font-size="11" fill="#666" text-anchor="middle">LTS</text>
  <rect x="40" y="160" width="160" height="200" stroke="#1565c0" fill="#e3f2fd"/>
  <text x="120" y="180" font-size="11" fill="#1565c0" text-anchor="middle" font-weight="bold">핵심:</text>
  <text x="50" y="200" font-size="10" fill="#333">• Lambda + Stream API</text>
  <text x="50" y="216" font-size="10" fill="#333">• Method ref, default method</text>
  <text x="50" y="232" font-size="10" fill="#333">• PermGen 제거 → Metaspace</text>
  <text x="50" y="248" font-size="10" fill="#333">• Tiered Compilation 기본 on</text>
  <text x="50" y="265" font-size="10" fill="#c62828">• G1 not default (Parallel)</text>
  <text x="50" y="290" font-size="11" fill="#1565c0" font-weight="bold">운영:</text>
  <text x="50" y="307" font-size="10" fill="#333">대부분 enterprise still here</text>
  <text x="50" y="323" font-size="10" fill="#333">(2030년 premier support 종료)</text>
  <text x="50" y="345" font-size="10" fill="#c62828" font-weight="bold">유지 곤란</text>

  <!-- Java 11 -->
  <circle cx="360" cy="120" r="10" fill="#2e7d32"/>
  <text x="360" y="105" font-size="13" fill="#2e7d32" text-anchor="middle" font-weight="bold">JDK 11 (2018)</text>
  <text x="360" y="145" font-size="11" fill="#666" text-anchor="middle">LTS</text>
  <rect x="280" y="160" width="160" height="200" stroke="#2e7d32" fill="#e8f5e9"/>
  <text x="360" y="180" font-size="11" fill="#2e7d32" text-anchor="middle" font-weight="bold">핵심:</text>
  <text x="290" y="200" font-size="10" fill="#333">• var keyword (10에서)</text>
  <text x="290" y="216" font-size="10" fill="#333">• HTTP Client API</text>
  <text x="290" y="232" font-size="10" fill="#333">• G1 default (9에서)</text>
  <text x="290" y="248" font-size="10" fill="#333">• Nest-based access</text>
  <text x="290" y="265" font-size="10" fill="#333">• ZGC experimental</text>
  <text x="290" y="290" font-size="11" fill="#2e7d32" font-weight="bold">운영:</text>
  <text x="290" y="307" font-size="10" fill="#333">현 보편 LTS. 마이그레이션</text>
  <text x="290" y="323" font-size="10" fill="#333">main target. 옵션 호환성 ↑</text>

  <!-- Java 17 -->
  <circle cx="600" cy="120" r="10" fill="#ef6c00"/>
  <text x="600" y="105" font-size="13" fill="#ef6c00" text-anchor="middle" font-weight="bold">JDK 17 (2021)</text>
  <text x="600" y="145" font-size="11" fill="#666" text-anchor="middle">LTS</text>
  <rect x="520" y="160" width="160" height="200" stroke="#ef6c00" fill="#fff3e0"/>
  <text x="600" y="180" font-size="11" fill="#ef6c00" text-anchor="middle" font-weight="bold">핵심:</text>
  <text x="530" y="200" font-size="10" fill="#333">• Sealed classes</text>
  <text x="530" y="216" font-size="10" fill="#333">• Records (16)</text>
  <text x="530" y="232" font-size="10" fill="#333">• Pattern matching (preview)</text>
  <text x="530" y="248" font-size="10" fill="#333">• ZGC production-ready (15)</text>
  <text x="530" y="265" font-size="10" fill="#333">• Strong encapsulation</text>
  <text x="530" y="290" font-size="11" fill="#ef6c00" font-weight="bold">운영:</text>
  <text x="530" y="307" font-size="10" fill="#333">현 주류. Spring Boot 3 require.</text>
  <text x="530" y="323" font-size="10" fill="#333">latency-critical은 ZGC 검토</text>

  <!-- Java 21 -->
  <circle cx="840" cy="120" r="10" fill="#7b1fa2"/>
  <text x="840" y="105" font-size="13" fill="#7b1fa2" text-anchor="middle" font-weight="bold">JDK 21 (2023)</text>
  <text x="840" y="145" font-size="11" fill="#666" text-anchor="middle">LTS</text>
  <rect x="760" y="160" width="160" height="200" stroke="#7b1fa2" fill="#f3e5f5"/>
  <text x="840" y="180" font-size="11" fill="#7b1fa2" text-anchor="middle" font-weight="bold">핵심:</text>
  <text x="770" y="200" font-size="10" fill="#333">• Virtual Threads (Loom)</text>
  <text x="770" y="216" font-size="10" fill="#333">• Generational ZGC</text>
  <text x="770" y="232" font-size="10" fill="#333">• Pattern matching for switch</text>
  <text x="770" y="248" font-size="10" fill="#333">• Sequenced collections</text>
  <text x="770" y="265" font-size="10" fill="#333">• Record patterns</text>
  <text x="770" y="290" font-size="11" fill="#7b1fa2" font-weight="bold">운영:</text>
  <text x="770" y="307" font-size="10" fill="#333">차세대 default. Virtual</text>
  <text x="770" y="323" font-size="10" fill="#333">Thread 도입 시작. 마이그레이션</text>
  <text x="770" y="339" font-size="10" fill="#333">main target.</text>

  <!-- Java 25 -->
  <circle cx="1080" cy="120" r="10" fill="#c62828"/>
  <text x="1080" y="105" font-size="13" fill="#c62828" text-anchor="middle" font-weight="bold">JDK 25 (예상 2025)</text>
  <text x="1080" y="145" font-size="11" fill="#666" text-anchor="middle">LTS</text>
  <rect x="1000" y="160" width="240" height="200" stroke="#c62828" fill="#ffcdd2"/>
  <text x="1120" y="180" font-size="11" fill="#c62828" text-anchor="middle" font-weight="bold">예상 핵심:</text>
  <text x="1010" y="200" font-size="10" fill="#333">• synchronized pinning 해소 (JEP 491)</text>
  <text x="1010" y="216" font-size="10" fill="#333">• Project Lilliput (Mark Word 압축)</text>
  <text x="1010" y="232" font-size="10" fill="#333">• Vector API stable</text>
  <text x="1010" y="248" font-size="10" fill="#333">• Foreign Function & Memory API 확장</text>
  <text x="1010" y="265" font-size="10" fill="#333">• Project Leyden (AOT) 진전</text>
  <text x="1010" y="290" font-size="11" fill="#c62828" font-weight="bold">예상 운영:</text>
  <text x="1010" y="307" font-size="10" fill="#333">VT 본격 채택. Native Image</text>
  <text x="1010" y="323" font-size="10" fill="#333">대체. 차세대 default GC: Gen ZGC.</text>

  <!-- 운영 가이드 -->
  <rect x="30" y="400" width="1240" height="180" rx="10" ry="10" stroke="#1e1e1e" fill="#fafafa" stroke-width="1"/>
  <text x="650" y="425" font-size="14" fill="#1e1e1e" text-anchor="middle" font-weight="bold">시니어 운영 가이드 — JDK 선택</text>
  <text x="50" y="450" font-size="11" fill="#333">• <tspan font-weight="bold">현재 운영 (2025):</tspan> JDK 11 또는 17이 보편. JDK 21로 새 프로젝트 시작.</text>
  <text x="50" y="470" font-size="11" fill="#333">• <tspan font-weight="bold">신규 프로젝트:</tspan> JDK 21 (Virtual Thread + Generational ZGC). Spring Boot 3.2+.</text>
  <text x="50" y="490" font-size="11" fill="#333">• <tspan font-weight="bold">마이그레이션 우선순위:</tspan> 8 → 11 (가장 큰 jump) → 17 → 21. 각 단계 호환성 검증.</text>
  <text x="50" y="510" font-size="11" fill="#333">• <tspan font-weight="bold">Latency-critical:</tspan> JDK 17 + ZGC 또는 JDK 21 + Generational ZGC.</text>
  <text x="50" y="530" font-size="11" fill="#333">• <tspan font-weight="bold">고동시성 서버:</tspan> JDK 21 + Virtual Thread + Spring Boot 3.2+.</text>
  <text x="50" y="550" font-size="11" fill="#333">• <tspan font-weight="bold">Cloud cost ↓:</tspan> JDK 21 + AppCDS, Native Image (GraalVM) 검토.</text>
  <text x="50" y="570" font-size="11" fill="#c62828">• <tspan font-weight="bold">JDK 8 운영:</tspan> 2030 premier support 종료. 마이그레이션 계획 수립 시급.</text>
</svg>
