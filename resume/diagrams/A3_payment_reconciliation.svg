<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1500 950" font-family="Pretendard, -apple-system, BlinkMacSystemFont, system-ui, sans-serif">
  <defs>
    <marker id="r-ar" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#0f172a"/>
    </marker>
    <marker id="r-ar-g" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#15803d"/>
    </marker>
    <symbol id="r-cloud" viewBox="0 0 80 48">
      <path d="M20 36 Q 4 36 4 24 Q 4 14 16 14 Q 18 4 30 4 Q 44 4 46 18 Q 60 16 64 28 Q 76 28 76 38 Q 76 44 68 44 L 22 44 Q 14 44 14 38 Z" fill="#ffffff" stroke="#0f172a" stroke-width="2"/>
    </symbol>
    <symbol id="r-db" viewBox="0 0 48 48">
      <ellipse cx="24" cy="9" rx="18" ry="5" fill="#ffffff" stroke="#0f172a" stroke-width="2"/>
      <path d="M 6 9 L 6 39 Q 6 44 24 44 Q 42 44 42 39 L 42 9" fill="#ffffff" stroke="#0f172a" stroke-width="2"/>
      <ellipse cx="24" cy="20" rx="18" ry="5" fill="none" stroke="#0f172a" stroke-width="1.4"/>
      <ellipse cx="24" cy="31" rx="18" ry="5" fill="none" stroke="#0f172a" stroke-width="1.4"/>
    </symbol>
    <symbol id="r-clock" viewBox="0 0 48 48">
      <circle cx="24" cy="24" r="20" fill="#ffffff" stroke="#0f172a" stroke-width="2"/>
      <line x1="24" y1="24" x2="24" y2="10" stroke="#0f172a" stroke-width="2"/>
      <line x1="24" y1="24" x2="34" y2="24" stroke="#0f172a" stroke-width="2"/>
      <circle cx="24" cy="24" r="2" fill="#0f172a"/>
    </symbol>
  </defs>

  <rect width="1500" height="950" fill="#ffffff"/>

  <text x="50" y="48" font-size="24" font-weight="700" fill="#0f172a">A3. 결제 정합성 reconciliation — 3종 inconsistency 자동 탐지 · 정정</text>
  <text x="50" y="76" font-size="14" fill="#64748b">사후 환불·CS 부담을 사전 탐지로 전환 · DB 차집합 K &lt;&lt; N 압축 · 4-way 분기 자동 정정</text>

  <!-- 진입점 -->
  <use href="#r-clock" x="60" y="120" width="64" height="64"/>
  <text x="92" y="200" font-size="13" font-weight="700" fill="#0f172a" text-anchor="middle">일일 cron</text>
  <text x="92" y="218" font-size="11" fill="#64748b" text-anchor="middle">SafeCron · 09:10 KST</text>

  <text x="180" y="160" font-size="14" fill="#64748b">또는</text>

  <rect x="240" y="130" width="220" height="64" rx="10" fill="#ffffff" stroke="#0f172a" stroke-width="2"/>
  <text x="350" y="156" font-size="13" font-weight="700" fill="#0f172a" text-anchor="middle">어드민 수동 트리거</text>
  <text x="350" y="178" font-size="11" fill="#64748b" text-anchor="middle">POST /admin/payment-sync</text>

  <line x1="160" y1="160" x2="238" y2="160" stroke="#0f172a" stroke-width="1" stroke-dasharray="3 3"/>
  <line x1="460" y1="160" x2="538" y2="160" stroke="#0f172a" stroke-width="1.8" marker-end="url(#r-ar)"/>

  <!-- 차집합 추출 -->
  <rect x="540" y="120" width="320" height="80" rx="10" fill="#f8fafc" stroke="#0f172a" stroke-width="2"/>
  <text x="700" y="146" font-size="13" font-weight="700" fill="#0f172a" text-anchor="middle">DB 차집합 추출 — 의심 K &lt;&lt; N 압축</text>
  <text x="700" y="166" font-size="11" fill="#64748b" text-anchor="middle">전체 N 대신 의심 K 명에만 외부 호출</text>
  <text x="700" y="184" font-size="10" font-weight="600" fill="#15803d" text-anchor="middle">→ rate-limit 안에서 5분 cron 완료</text>

  <line x1="860" y1="160" x2="918" y2="160" stroke="#0f172a" stroke-width="1.8" marker-end="url(#r-ar)"/>

  <!-- 외부 PG 호출 -->
  <use href="#r-cloud" x="920" y="120" width="120" height="80"/>
  <text x="980" y="220" font-size="13" font-weight="700" fill="#0f172a" text-anchor="middle">외부 PG</text>
  <text x="980" y="238" font-size="10" fill="#64748b" text-anchor="middle">getSchedulesByBillingKey</text>

  <line x1="1050" y1="160" x2="1108" y2="160" stroke="#0f172a" stroke-width="1.8" marker-end="url(#r-ar)"/>

  <!-- 4-way 분기 -->
  <rect x="1110" y="120" width="340" height="80" rx="10" fill="#ffffff" stroke="#0f172a" stroke-width="2"/>
  <text x="1280" y="148" font-size="13" font-weight="700" fill="#0f172a" text-anchor="middle">응답 4-way 분기 · 자동 정정</text>
  <text x="1130" y="170" font-size="10" fill="#0f172a">0개 → 좀비 정정  ·  1개 → 정상</text>
  <text x="1130" y="186" font-size="10" fill="#0f172a">2+ → scheduleCancel  ·  무응답 → Slack</text>

  <!-- 3종 issue 박스 -->
  <text x="50" y="280" font-size="16" font-weight="700" fill="#0f172a">3종 inconsistency — 사용자 클레임 전 사전 탐지</text>

  <g transform="translate(50, 300)">
    <rect width="450" height="220" rx="12" fill="#ffffff" stroke="#0f172a" stroke-width="2"/>

    <circle cx="36" cy="36" r="18" fill="#0f172a"/>
    <text x="36" y="42" font-size="14" font-weight="700" fill="#ffffff" text-anchor="middle">1</text>
    <text x="68" y="42" font-size="14" font-weight="700" fill="#0f172a">좀비 schedule</text>

    <line x1="20" y1="64" x2="430" y2="64" stroke="#e2e8f0" stroke-width="1"/>

    <text x="20" y="92" font-size="12" font-weight="700" fill="#64748b">현상</text>
    <text x="80" y="92" font-size="12" fill="#0f172a">외부 PG 에는 schedule 살아있음</text>
    <text x="80" y="110" font-size="12" fill="#0f172a">DB 는 cancel 로 기록</text>

    <text x="20" y="138" font-size="12" font-weight="700" fill="#64748b">탐지</text>
    <text x="80" y="138" font-size="12" fill="#0f172a">cancelled / scheduled-cancelled 차집합</text>

    <text x="20" y="180" font-size="12" font-weight="700" fill="#15803d">정정</text>
    <text x="80" y="180" font-size="12" fill="#0f172a">SCHEDULED_CANCELLED 자동 보정</text>
    <text x="80" y="200" font-size="11" font-style="italic" fill="#64748b">→ 다음 결제일 자동 과금 차단</text>
  </g>

  <g transform="translate(525, 300)">
    <rect width="450" height="220" rx="12" fill="#ffffff" stroke="#0f172a" stroke-width="2"/>

    <circle cx="36" cy="36" r="18" fill="#0f172a"/>
    <text x="36" y="42" font-size="14" font-weight="700" fill="#ffffff" text-anchor="middle">2</text>
    <text x="68" y="42" font-size="14" font-weight="700" fill="#0f172a">중복 빌링키</text>

    <line x1="20" y1="64" x2="430" y2="64" stroke="#e2e8f0" stroke-width="1"/>

    <text x="20" y="92" font-size="12" font-weight="700" fill="#64748b">현상</text>
    <text x="80" y="92" font-size="12" fill="#0f172a">한 사용자에 SCHEDULED billing 2+ 잡힘</text>

    <text x="20" y="120" font-size="12" font-weight="700" fill="#64748b">탐지</text>
    <text x="80" y="120" font-size="12" font-family="D2Coding, Consolas, monospace" fill="#0f172a">GROUP BY HAVING COUNT &gt; 1</text>

    <text x="20" y="160" font-size="12" font-weight="700" fill="#15803d">정정</text>
    <text x="80" y="160" font-size="12" fill="#0f172a">billing.merchant_uid 외 schedule 자동 cancel</text>
    <text x="80" y="180" font-size="11" font-style="italic" fill="#64748b">→ 다음 결제일 이중 과금 차단</text>
  </g>

  <g transform="translate(1000, 300)">
    <rect width="450" height="220" rx="12" fill="#ffffff" stroke="#0f172a" stroke-width="2"/>

    <circle cx="36" cy="36" r="18" fill="#0f172a"/>
    <text x="36" y="42" font-size="14" font-weight="700" fill="#ffffff" text-anchor="middle">3</text>
    <text x="68" y="42" font-size="14" font-weight="700" fill="#0f172a">admin override orphan</text>

    <line x1="20" y1="64" x2="430" y2="64" stroke="#e2e8f0" stroke-width="1"/>

    <text x="20" y="92" font-size="12" font-weight="700" fill="#64748b">현상</text>
    <text x="80" y="92" font-size="12" fill="#0f172a">어드민 수동 1년 연장 후</text>
    <text x="80" y="110" font-size="12" fill="#0f172a">이전 자동결제 schedule 잔존</text>

    <text x="20" y="138" font-size="12" font-weight="700" fill="#64748b">탐지</text>
    <text x="80" y="138" font-size="11" fill="#0f172a">활성 종료일 &gt; 다음 결제 + 1m</text>
    <text x="80" y="154" font-size="11" font-family="D2Coding, Consolas, monospace" fill="#0f172a">단일 4단 JOIN SQL</text>

    <text x="20" y="180" font-size="12" font-weight="700" fill="#15803d">정정</text>
    <text x="80" y="180" font-size="12" fill="#0f172a">자동 cancel + 운영자 Slack 알림</text>
  </g>

  <!-- 출력 라인 -->
  <text x="50" y="565" font-size="16" font-weight="700" fill="#0f172a">출력 — 사후 환불을 사전 차단으로 전환</text>

  <g transform="translate(50, 590)">
    <rect width="700" height="120" rx="10" fill="#ecfdf5" stroke="#15803d" stroke-width="2"/>
    <text x="20" y="28" font-size="14" font-weight="700" fill="#14532d">자동 정정 (코드 레벨)</text>
    <text x="20" y="52" font-size="11" fill="#0f172a">▸ 외부 PG scheduleCancel 자동 호출 — 잘못된 schedule 제거</text>
    <text x="20" y="70" font-size="11" fill="#0f172a">▸ DB status SCHEDULED_CANCELLED 자동 보정</text>
    <text x="20" y="88" font-size="11" fill="#0f172a">▸ 사례 14 SafeCron 으로 멀티 인스턴스에서 한 번만 실행</text>
    <text x="20" y="108" font-size="11" font-weight="700" fill="#15803d">→ 사용자가 클레임하기 전에 차단</text>
  </g>

  <g transform="translate(770, 590)">
    <rect width="680" height="120" rx="10" fill="#fffbeb" stroke="#b45309" stroke-width="2"/>
    <text x="20" y="28" font-size="14" font-weight="700" fill="#78350f">운영자 알림 (Slack)</text>
    <text x="20" y="52" font-size="11" fill="#0f172a">▸ 매일 09:10 KST 정합성 리포트 한 메시지</text>
    <text x="20" y="70" font-size="11" fill="#0f172a">▸ "좀비 예약 점검 대상: K개 customer_uid (active S개 제외)" — 압축률 명시</text>
    <text x="20" y="88" font-size="11" fill="#0f172a">▸ 외부 PG 무응답 customer_uid 목록 (수동 확인 필요)</text>
    <text x="20" y="108" font-size="11" font-weight="700" fill="#15803d">→ 운영자가 사후 환불 없이 사전 인지</text>
  </g>

  <!-- 운영 검증 -->
  <rect x="50" y="740" width="1400" height="180" rx="12" fill="#f8fafc" stroke="#0f172a" stroke-width="2"/>
  <text x="70" y="770" font-size="16" font-weight="700" fill="#0f172a">설계 결정 · 운영 검증 결과</text>
  <line x1="70" y1="784" x2="1430" y2="784" stroke="#e2e8f0" stroke-width="1"/>

  <text x="70" y="810" font-size="12" font-weight="700" fill="#0f172a">설계 결정</text>
  <text x="200" y="810" font-size="12" fill="#0f172a">전체 N 명에 매일 호출 = rate-limit 초과 → DB 차집합으로 의심 K 명에만 호출</text>

  <text x="70" y="836" font-size="12" font-weight="700" fill="#0f172a">진입점</text>
  <text x="200" y="836" font-size="12" fill="#0f172a">cron 자동 + 어드민 수동 트리거 이중 진입점 — 운영 대응 유연성 확보</text>

  <text x="70" y="862" font-size="12" font-weight="700" fill="#0f172a">멀티 인스턴스</text>
  <text x="200" y="862" font-size="12" fill="#0f172a">SafeCron 데코레이터로 분산 락 — 한 시점에 한 인스턴스에서만 실행</text>

  <text x="70" y="894" font-size="12" font-weight="700" fill="#15803d">JVM 매핑</text>
  <text x="200" y="894" font-size="12" fill="#0f172a">Spring Scheduler + ShedLock · JdbcTemplate / QueryDSL 차집합 쿼리 · Spring Retry 외부 호출 보호</text>
</svg>
