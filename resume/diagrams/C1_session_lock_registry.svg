<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1500 950" font-family="Pretendard, -apple-system, BlinkMacSystemFont, system-ui, sans-serif">
  <defs>
    <marker id="e-ar" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#0f172a"/>
    </marker>
    <marker id="e-ar-g" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#15803d"/>
    </marker>

    <symbol id="e-worker" viewBox="0 0 48 48">
      <circle cx="24" cy="24" r="10" fill="#ffffff" stroke="#0f172a" stroke-width="2"/>
      <circle cx="24" cy="24" r="3.5" fill="#0f172a"/>
      <g stroke="#0f172a" stroke-width="2.5" stroke-linecap="round">
        <line x1="24" y1="6" x2="24" y2="12"/><line x1="24" y1="36" x2="24" y2="42"/>
        <line x1="6" y1="24" x2="12" y2="24"/><line x1="36" y1="24" x2="42" y2="24"/>
        <line x1="11" y1="11" x2="15.5" y2="15.5"/><line x1="32.5" y1="32.5" x2="37" y2="37"/>
        <line x1="11" y1="37" x2="15.5" y2="32.5"/><line x1="32.5" y1="15.5" x2="37" y2="11"/>
      </g>
    </symbol>
    <symbol id="e-browser" viewBox="0 0 48 48">
      <rect x="4" y="8" width="40" height="32" rx="2" fill="#ffffff" stroke="#0f172a" stroke-width="2"/>
      <line x1="4" y1="18" x2="44" y2="18" stroke="#0f172a" stroke-width="1.5"/>
      <circle cx="10" cy="13" r="1.6" fill="#0f172a"/>
      <circle cx="15" cy="13" r="1.6" fill="#0f172a"/>
      <circle cx="20" cy="13" r="1.6" fill="#0f172a"/>
    </symbol>
    <symbol id="e-cache" viewBox="0 0 48 48">
      <ellipse cx="24" cy="10" rx="16" ry="5" fill="#ffffff" stroke="#0f172a" stroke-width="2"/>
      <path d="M 8 10 L 8 38 Q 8 43 24 43 Q 40 43 40 38 L 40 10" fill="#ffffff" stroke="#0f172a" stroke-width="2"/>
      <text x="24" y="32" font-size="9" font-weight="700" font-family="sans-serif" fill="#0f172a" text-anchor="middle">CACHE</text>
    </symbol>
    <symbol id="e-lock" viewBox="0 0 48 48">
      <rect x="10" y="22" width="28" height="22" rx="3" fill="#ffffff" stroke="#0f172a" stroke-width="2"/>
      <path d="M 16 22 L 16 16 Q 16 6 24 6 Q 32 6 32 16 L 32 22" fill="none" stroke="#0f172a" stroke-width="2"/>
      <circle cx="24" cy="32" r="2.5" fill="#0f172a"/>
    </symbol>
  </defs>

  <rect width="1500" height="950" fill="#ffffff"/>

  <!-- Title -->
  <text x="50" y="48" font-size="24" font-weight="700" fill="#0f172a">C1. 세션 락 레지스트리 — FIFO + Lease TTL + Cold-Start Guard</text>
  <text x="50" y="76" font-size="14" fill="#64748b">30+ 워커 동시 로그인 race 를 4 layer 직렬화 + Handoff 패턴 + 안전망 3종</text>

  <!-- ===== Workers (left) ===== -->
  <text x="60" y="138" font-size="13" font-weight="700" fill="#0f172a">분산 워커 — 동시 진입</text>

  <g transform="translate(60, 158)">
    <use href="#e-worker" x="0" y="0" width="56" height="56"/>
    <text x="80" y="22" font-size="13" font-weight="700" fill="#0f172a">Worker 1</text>
    <text x="80" y="42" font-size="11" fill="#64748b">acquire(shop_A)</text>
  </g>
  <g transform="translate(60, 238)">
    <use href="#e-worker" x="0" y="0" width="56" height="56"/>
    <text x="80" y="22" font-size="13" font-weight="700" fill="#0f172a">Worker 2</text>
    <text x="80" y="42" font-size="11" fill="#64748b">acquire(shop_A)</text>
  </g>
  <g transform="translate(60, 318)">
    <use href="#e-worker" x="0" y="0" width="56" height="56"/>
    <text x="80" y="22" font-size="13" font-weight="700" fill="#0f172a">Worker 3</text>
    <text x="80" y="42" font-size="11" fill="#64748b">acquire(shop_A)</text>
  </g>
  <g transform="translate(60, 398)">
    <use href="#e-worker" x="0" y="0" width="56" height="56"/>
    <text x="80" y="22" font-size="13" font-weight="700" fill="#0f172a">Worker N</text>
    <text x="80" y="42" font-size="11" fill="#64748b">acquire(shop_A)</text>
  </g>

  <!-- arrow to registry -->
  <line x1="220" y1="186" x2="290" y2="280" stroke="#0f172a" stroke-width="1.4" marker-end="url(#e-ar)"/>
  <line x1="220" y1="266" x2="290" y2="290" stroke="#0f172a" stroke-width="1.4" marker-end="url(#e-ar)"/>
  <line x1="220" y1="346" x2="290" y2="300" stroke="#0f172a" stroke-width="1.4" marker-end="url(#e-ar)"/>
  <line x1="220" y1="426" x2="290" y2="310" stroke="#0f172a" stroke-width="1.4" marker-end="url(#e-ar)"/>

  <!-- ===== Central Registry ===== -->
  <rect x="295" y="140" width="700" height="380" rx="14" fill="#ffffff" stroke="#0f172a" stroke-width="2.5"/>
  <use href="#e-lock" x="320" y="156" width="32" height="32"/>
  <text x="370" y="180" font-size="17" font-weight="700" fill="#0f172a">세션 락 레지스트리 (shop_id 단위 직렬화)</text>

  <!-- FIFO 시각화 — 큐 박스들 -->
  <text x="320" y="222" font-size="13" font-weight="700" fill="#0f172a">FIFO 큐 (분산 캐시 LIST)</text>

  <!-- HEAD (granted) -->
  <g transform="translate(320, 240)">
    <rect width="200" height="76" rx="8" fill="#dcfce7" stroke="#15803d" stroke-width="2"/>
    <text x="100" y="22" font-size="11" font-weight="700" fill="#15803d" text-anchor="middle">[HEAD] GRANTED</text>
    <text x="100" y="44" font-size="13" font-weight="700" fill="#0f172a" text-anchor="middle">Worker 1</text>
    <text x="100" y="62" font-size="10" fill="#64748b" text-anchor="middle">Lease 90s · 5s 갱신</text>
  </g>

  <line x1="525" y1="278" x2="548" y2="278" stroke="#0f172a" stroke-width="1.8" marker-end="url(#e-ar)"/>

  <!-- queued -->
  <g transform="translate(550, 240)">
    <rect width="130" height="76" rx="8" fill="#f1f5f9" stroke="#64748b" stroke-width="1.8"/>
    <text x="65" y="22" font-size="11" font-weight="600" fill="#64748b" text-anchor="middle">QUEUED · pos 1</text>
    <text x="65" y="44" font-size="13" font-weight="700" fill="#0f172a" text-anchor="middle">Worker 2</text>
  </g>
  <g transform="translate(690, 240)">
    <rect width="130" height="76" rx="8" fill="#f1f5f9" stroke="#64748b" stroke-width="1.8"/>
    <text x="65" y="22" font-size="11" font-weight="600" fill="#64748b" text-anchor="middle">QUEUED · pos 2</text>
    <text x="65" y="44" font-size="13" font-weight="700" fill="#0f172a" text-anchor="middle">Worker 3</text>
  </g>
  <g transform="translate(830, 240)">
    <rect width="130" height="76" rx="8" fill="#f1f5f9" stroke="#64748b" stroke-width="1.8"/>
    <text x="65" y="22" font-size="11" font-weight="600" fill="#64748b" text-anchor="middle">QUEUED · pos …</text>
    <text x="65" y="44" font-size="13" font-weight="700" fill="#0f172a" text-anchor="middle">Worker N</text>
  </g>

  <!-- Handoff -->
  <rect x="320" y="332" width="640" height="50" rx="8" fill="#f8fafc" stroke="#0f172a" stroke-width="1.5"/>
  <text x="340" y="354" font-size="13" font-weight="700" fill="#0f172a">Handoff — Worker 1 release 시 Worker 2 가 동일 세션 재사용</text>
  <text x="340" y="370" font-size="11" fill="#475569">외부 플랫폼 재로그인 0회 (IP 평판 보호) · 브라우저 인스턴스 재생성 0회</text>

  <!-- lease value -->
  <rect x="320" y="396" width="640" height="50" rx="8" fill="#ffffff" stroke="#0f172a" stroke-width="1.5"/>
  <text x="340" y="418" font-size="13" font-weight="700" fill="#0f172a">Instance-aware Lease Value (fencing token 단순화)</text>
  <text x="340" y="434" font-size="11" font-family="D2Coding, Consolas, monospace" fill="#475569">{instanceId-UUID} : {timestamp}     → cross-instance ownership 검증</text>

  <!-- Watchdog -->
  <rect x="320" y="460" width="640" height="44" rx="8" fill="#ffffff" stroke="#0f172a" stroke-width="1.5"/>
  <text x="340" y="480" font-size="13" font-weight="700" fill="#0f172a">Watchdog (2s 주기)  +  Handle 패턴 (RAII) + activeCount invariant</text>
  <text x="340" y="496" font-size="11" fill="#475569">stale head 자동 eviction  ·  다른 worker 활성 시 close 보류</text>

  <!-- ===== Right: Browser Pool ===== -->
  <rect x="1010" y="140" width="430" height="380" rx="14" fill="#ffffff" stroke="#0f172a" stroke-width="2.5"/>
  <use href="#e-browser" x="1030" y="158" width="36" height="36"/>
  <text x="1080" y="184" font-size="17" font-weight="700" fill="#0f172a">헤드리스 브라우저 풀</text>

  <text x="1030" y="222" font-size="12" fill="#64748b">stealth fork · 1 인스턴스 ≈ 1GB · launch 5~10초</text>

  <rect x="1030" y="240" width="390" height="60" rx="8" fill="#ffffff" stroke="#0f172a" stroke-width="1.5"/>
  <text x="1050" y="262" font-size="12" font-weight="700" fill="#0f172a">Launch Semaphore + Prewarm Pool</text>
  <text x="1050" y="282" font-size="10" fill="#64748b">동시 launch 상한 · 미리 띄운 인스턴스 재사용</text>

  <rect x="1030" y="312" width="390" height="60" rx="8" fill="#ffffff" stroke="#0f172a" stroke-width="1.5"/>
  <text x="1050" y="334" font-size="12" font-weight="700" fill="#0f172a">Quarantine + Zombie Cleanup (5-phase)</text>
  <text x="1050" y="354" font-size="10" fill="#64748b">orphan PID 5분 reconcile · 자원 격리</text>

  <rect x="1030" y="384" width="390" height="60" rx="8" fill="#ffffff" stroke="#0f172a" stroke-width="1.5"/>
  <text x="1050" y="406" font-size="12" font-weight="700" fill="#0f172a">Jittered Watchdog + Idle Timer</text>
  <text x="1050" y="426" font-size="10" fill="#64748b">Thundering Herd 회피 · idle 자동 회수</text>

  <text x="1225" y="478" font-size="11" font-weight="700" fill="#15803d" text-anchor="middle">40 concurrent 환경 97.2% 성공률</text>
  <text x="1225" y="498" font-size="11" font-weight="700" fill="#15803d" text-anchor="middle">execution context destroyed 0건</text>

  <line x1="995" y1="320" x2="1010" y2="320" stroke="#0f172a" stroke-width="1.8" marker-end="url(#e-ar)"/>

  <!-- ===== Cold-Start Guard ===== -->
  <rect x="50" y="550" width="700" height="200" rx="12" fill="#ffffff" stroke="#0f172a" stroke-width="2"/>
  <text x="70" y="580" font-size="16" font-weight="700" fill="#0f172a">Cold-Start Guard — 가장 미묘한 hazard 차단</text>
  <text x="70" y="600" font-size="11" fill="#64748b">인스턴스 ID 를 lease value 에 박아 ownership 을 lease-level 에서 검증</text>

  <line x1="70" y1="612" x2="730" y2="612" stroke="#e2e8f0" stroke-width="1"/>

  <text x="70" y="636" font-size="13" font-weight="700" fill="#b91c1c">deadlock 시나리오</text>
  <text x="70" y="656" font-size="11" fill="#0f172a">① 인스턴스 다운 → 큐 head 에는 옛 requestId 잔존</text>
  <text x="70" y="674" font-size="11" fill="#0f172a">② 새 task 부팅 → in-memory Map 비어있음</text>
  <text x="70" y="692" font-size="11" fill="#0f172a">③ 새 worker 가 head 차례 대기 → 옛 worker 영영 release 안 함</text>

  <text x="380" y="636" font-size="13" font-weight="700" fill="#15803d">해결</text>
  <text x="380" y="656" font-size="11" fill="#0f172a">▸ 새 인스턴스 첫 enqueue 시 head 의 lease prefix 비교</text>
  <text x="380" y="674" font-size="11" fill="#0f172a">▸ 다르면 옛 인스턴스 잔재 → 큐 통째 비움</text>
  <text x="380" y="700" font-size="11" font-weight="700" fill="#15803d">⇒ dead-letter 누수 0건</text>

  <!-- ===== Cluster CROSSSLOT policy ===== -->
  <rect x="770" y="550" width="680" height="200" rx="12" fill="#ffffff" stroke="#0f172a" stroke-width="2"/>
  <text x="790" y="580" font-size="16" font-weight="700" fill="#0f172a">Cluster 정책 — 모듈별 의도된 분기</text>

  <use href="#e-cache" x="790" y="600" width="50" height="50"/>

  <rect x="855" y="600" width="290" height="74" rx="8" fill="#ffffff" stroke="#0f172a" stroke-width="1.5"/>
  <text x="870" y="622" font-size="12" font-weight="700" fill="#0f172a">[Queue]  단일 키 분리</text>
  <text x="870" y="640" font-size="10" fill="#64748b">slot spread 우선 · CROSSSLOT 회피</text>
  <text x="870" y="660" font-size="10" font-style="italic" fill="#15803d">부하 분산 &gt; 트랜잭션 묶음</text>

  <rect x="1155" y="600" width="290" height="74" rx="8" fill="#ffffff" stroke="#0f172a" stroke-width="1.5"/>
  <text x="1170" y="622" font-size="12" font-weight="700" fill="#0f172a">[평판]  hash tag {pool}</text>
  <text x="1170" y="640" font-size="10" fill="#64748b">슬롯 강제 배정 · MULTI/EXEC 묶음</text>
  <text x="1170" y="660" font-size="10" font-style="italic" fill="#15803d">트랜잭션 묶음 &gt; 부하 분산</text>

  <text x="790" y="708" font-size="11" fill="#0f172a">▸ 같은 시스템 안에 두 전략을 의도적으로 다르게 — 모듈마다 우선 가치가 다름</text>
  <text x="790" y="730" font-size="11" font-weight="700" fill="#15803d">⇒ CROSSSLOT 에러 0건</text>

  <!-- ===== Result strip ===== -->
  <rect x="50" y="780" width="1400" height="140" rx="10" fill="#f8fafc" stroke="#0f172a" stroke-width="1.8"/>
  <text x="70" y="810" font-size="16" font-weight="700" fill="#0f172a">운영 검증 결과 (최근 6개월)</text>

  <g font-size="13" fill="#0f172a">
    <text x="70" y="838">▸ 세션 유지율 — <tspan font-weight="700" fill="#15803d">99.2%</tspan></text>
    <text x="500" y="838">▸ 동일 매장 동시 로그인 — <tspan font-weight="700" fill="#15803d">0건</tspan></text>
    <text x="990" y="838">▸ execution context destroyed — <tspan font-weight="700" fill="#15803d">0건</tspan></text>

    <text x="70" y="864">▸ 댓글 등록 중복 — <tspan font-weight="700" fill="#15803d">0건 / 6개월</tspan></text>
    <text x="500" y="864">▸ dead-letter 누수 — <tspan font-weight="700" fill="#15803d">0건</tspan></text>
    <text x="990" y="864">▸ CROSSSLOT — <tspan font-weight="700" fill="#15803d">0건</tspan></text>

    <text x="70" y="900" font-size="11" font-style="italic" fill="#15803d">cold-start guard + handoff + 안전망 3종이 모두 가동되는 패턴이 운영 로그에서 정기 검출 — race 가 실제 발생하나 코드 레벨에서 차단됨이 데이터로 입증</text>
  </g>
</svg>
