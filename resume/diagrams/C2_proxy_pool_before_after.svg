  <text x="860" y="396" font-size="10" fill="#64748b">pool exhausted 시에만 fallback (blocklist 필터 통과 시)</text>

  <!-- ===== port↔IP 매핑 3중 ===== -->
  <text x="50" y="478" font-size="16" font-weight="700" fill="#0f172a">port ↔ IP 매핑 3중 저장 — 클러스터 cold start 외부 의존 X</text>

  <g transform="translate(50, 500)">
    <rect width="330" height="120" rx="10" fill="#ffffff" stroke="#0f172a" stroke-width="1.8"/>
    <text x="20" y="30" font-size="13" font-weight="700" fill="#0f172a">① In-memory Map</text>
    <text x="20" y="54" font-size="11" fill="#64748b">PortIpResolver — 가장 빠른 경로</text>
    <text x="20" y="76" font-size="11" fill="#64748b">runtime hot lookup</text>
    <text x="20" y="100" font-size="10" font-weight="600" fill="#15803d">latency 최소화</text>
  </g>
  <g transform="translate(400, 500)">
    <rect width="330" height="120" rx="10" fill="#ffffff" stroke="#0f172a" stroke-width="1.8"/>
