  <g transform="translate(730, 854)">
    <rect width="310" height="48" rx="6" fill="#ffffff" stroke="#0f172a" stroke-width="1.4"/>
    <text x="155" y="22" font-size="11" font-weight="700" fill="#64748b" text-anchor="middle">SPOF 제거</text>
    <text x="155" y="40" font-size="14" font-weight="700" fill="#0f172a" text-anchor="middle">단일 벤더 의존 → HA 분산</text>
  </g>
  <g transform="translate(1060, 854)">
    <rect width="380" height="48" rx="6" fill="#ffffff" stroke="#0f172a" stroke-width="1.4"/>
    <text x="190" y="22" font-size="11" font-weight="700" fill="#64748b" text-anchor="middle">운영 절차 명문화</text>
    <text x="190" y="40" font-size="12" font-weight="700" fill="#0f172a" text-anchor="middle">env value · default 정책 AGENTS.md</text>
