  <text x="1400" y="282" font-size="10" font-weight="700" fill="#15803d" text-anchor="middle">성공률 98%</text>

  <line x1="1342" y1="200" x2="1360" y2="220" stroke="#15803d" stroke-width="2" marker-end="url(#f-ar-g)"/>
  <line x1="1342" y1="274" x2="1360" y2="246" stroke="#15803d" stroke-width="2" marker-end="url(#f-ar-g)"/>

