  <rect width="1500" height="950" fill="#ffffff"/>

  <!-- Title -->
  <text x="50" y="48" font-size="24" font-weight="700" fill="#0f172a">C2. 자체 IP 평판 시스템 — 외부 의존 제거 · 비용 88.75% 절감 · 성공률 70% → 98%</text>
  <text x="50" y="76" font-size="14" fill="#64748b">14 phase phased rollout — port↔IP 매핑 3중 · Adaptive Cooldown · 이중 blocklist · pool exhausted fallback</text>

  <!-- ===== BEFORE ===== -->
  <text x="60" y="124" font-size="20" font-weight="700" fill="#b91c1c">BEFORE</text>
  <rect x="170" y="104" width="180" height="32" rx="16" fill="#b91c1c"/>
  <text x="260" y="126" font-size="14" font-weight="700" fill="#ffffff" text-anchor="middle">월 800만 · SPOF</text>

  <rect x="50" y="150" width="700" height="280" rx="14" fill="#ffffff" stroke="#b91c1c" stroke-width="2.5"/>

  <use href="#f-worker" x="80" y="200" width="80" height="80"/>
  <text x="120" y="304" font-size="13" font-weight="700" fill="#0f172a" text-anchor="middle">스크래퍼 워커</text>

  <line x1="170" y1="240" x2="278" y2="240" stroke="#b91c1c" stroke-width="2.5" marker-end="url(#f-ar-r)"/>

  <use href="#f-cloud-x" x="280" y="190" width="180" height="120"/>
  <text x="370" y="332" font-size="13" font-weight="700" fill="#b91c1c" text-anchor="middle">외부 Residential 프록시</text>
  <text x="370" y="348" font-size="11" fill="#64748b" text-anchor="middle">Pay-per-GB · 단일 벤더</text>

  <line x1="470" y1="240" x2="578" y2="240" stroke="#b91c1c" stroke-width="2.5" marker-end="url(#f-ar-r)"/>

  <use href="#f-cloud" x="580" y="200" width="140" height="80"/>
  <text x="650" y="304" font-size="13" font-weight="700" fill="#0f172a" text-anchor="middle">6 외부 플랫폼</text>
  <text x="650" y="320" font-size="11" fill="#b91c1c" text-anchor="middle">성공률 70%</text>

  <!-- BEFORE problems -->
  <rect x="80" y="346" width="640" height="70" rx="8" fill="#fef2f2" stroke="#b91c1c" stroke-width="1.5"/>
  <text x="100" y="370" font-size="12" font-weight="700" fill="#b91c1c">핵심 한계</text>
  <text x="100" y="390" font-size="11" fill="#0f172a">① 비용 800만 · Pay-per-GB</text>
  <text x="300" y="390" font-size="11" fill="#0f172a">② SPOF — 벤더 장애 = 서비스 중단</text>
  <text x="100" y="408" font-size="11" fill="#0f172a">③ IP 가 매번 바뀜 → 평판 측정 불가</text>

  <!-- ===== Transition arrow ===== -->
  <g transform="translate(770, 280)">
    <rect x="0" y="0" width="36" height="50" fill="#0f172a"/>
    <polygon points="0,50 36,50 18,76" fill="#0f172a"/>
    <text x="18" y="32" font-size="12" font-weight="700" fill="#ffffff" text-anchor="middle">14</text>
    <text x="18" y="50" font-size="10" fill="#ffffff" text-anchor="middle">phase</text>
  </g>

  <!-- ===== AFTER ===== -->
  <text x="830" y="124" font-size="20" font-weight="700" fill="#15803d">AFTER</text>
  <rect x="940" y="104" width="280" height="32" rx="16" fill="#15803d"/>
  <text x="1080" y="126" font-size="14" font-weight="700" fill="#ffffff" text-anchor="middle">월 90만 (−88.75%) · 성공률 98%</text>

  <rect x="820" y="150" width="630" height="280" rx="14" fill="#ffffff" stroke="#15803d" stroke-width="2.5"/>

  <use href="#f-worker" x="840" y="200" width="64" height="64"/>
  <text x="872" y="282" font-size="12" font-weight="700" fill="#0f172a" text-anchor="middle">스크래퍼 워커</text>

  <line x1="908" y1="232" x2="956" y2="232" stroke="#0f172a" stroke-width="1.8" marker-end="url(#f-ar)"/>

  <!-- Platform Resolver -->
