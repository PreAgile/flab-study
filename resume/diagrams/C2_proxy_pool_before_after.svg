    <text x="160" y="28" font-size="13" font-weight="700" fill="#0f172a" text-anchor="middle">④ port rotation 회피</text>
    <text x="160" y="50" font-size="10" fill="#64748b" text-anchor="middle">차단 IP → 그 port 자동 SADD</text>
    <text x="160" y="68" font-size="10" fill="#64748b" text-anchor="middle">이중 blocklist (port + IP)</text>
    <text x="160" y="92" font-size="11" font-weight="700" fill="#15803d" text-anchor="middle">차단 누수 0건</text>
  </g>

  <!-- ===== KPI strip ===== -->
  <rect x="50" y="810" width="1400" height="110" rx="10" fill="#f8fafc" stroke="#0f172a" stroke-width="2"/>
  <text x="70" y="840" font-size="16" font-weight="700" fill="#0f172a">운영 검증 결과</text>

  <g transform="translate(70, 854)">
    <rect width="310" height="48" rx="6" fill="#ffffff" stroke="#15803d" stroke-width="1.4"/>
    <text x="155" y="22" font-size="11" font-weight="700" fill="#64748b" text-anchor="middle">월 비용</text>
    <text x="155" y="40" font-size="14" font-weight="700" fill="#15803d" text-anchor="middle">800만 → 90만 (−88.75%)</text>
  </g>
  <g transform="translate(400, 854)">
    <rect width="310" height="48" rx="6" fill="#ffffff" stroke="#15803d" stroke-width="1.4"/>
    <text x="155" y="22" font-size="11" font-weight="700" fill="#64748b" text-anchor="middle">요청 성공률</text>
    <text x="155" y="40" font-size="14" font-weight="700" fill="#15803d" text-anchor="middle">70% → 98%</text>
