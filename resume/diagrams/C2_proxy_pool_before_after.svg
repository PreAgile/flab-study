  <text x="1040" y="256" font-size="10" fill="#475569" text-anchor="middle">+ exhausted fallback</text>

  <!-- 2 paths -->
  <rect x="1140" y="170" width="200" height="60" rx="8" fill="#ffffff" stroke="#0f172a" stroke-width="2"/>
  <text x="1240" y="192" font-size="12" font-weight="700" fill="#0f172a" text-anchor="middle">자체 IP 평판 (포털)</text>
  <text x="1240" y="208" font-size="10" fill="#475569" text-anchor="middle">sticky pool · port↔IP 3중</text>
  <text x="1240" y="222" font-size="10" font-weight="600" fill="#15803d" text-anchor="middle">cold start 외부 의존 X</text>

  <rect x="1140" y="244" width="200" height="60" rx="8" fill="#ffffff" stroke="#0f172a" stroke-width="2"/>
  <text x="1240" y="266" font-size="12" font-weight="700" fill="#0f172a" text-anchor="middle">Datacenter 풀 (배달앱)</text>
  <text x="1240" y="282" font-size="10" fill="#475569" text-anchor="middle">Adaptive Cooldown</text>
  <text x="1240" y="296" font-size="10" font-weight="600" fill="#15803d" text-anchor="middle">Shadow mode 실험</text>

  <line x1="1124" y1="222" x2="1138" y2="200" stroke="#0f172a" stroke-width="1.6" marker-end="url(#f-ar)"/>
  <line x1="1124" y1="242" x2="1138" y2="270" stroke="#0f172a" stroke-width="1.6" marker-end="url(#f-ar)"/>

