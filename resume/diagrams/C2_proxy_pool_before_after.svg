    <text x="20" y="54" font-size="11" fill="#64748b">port_meta 키별 hash tag {pool}</text>
    <text x="20" y="76" font-size="11" fill="#64748b">인스턴스 간 공유</text>
    <text x="20" y="100" font-size="10" font-weight="600" fill="#15803d">CROSSSLOT 회피</text>
  </g>
  <g transform="translate(750, 500)">
    <rect width="330" height="120" rx="10" fill="#ffffff" stroke="#0f172a" stroke-width="1.8"/>
    <text x="20" y="30" font-size="13" font-weight="700" fill="#0f172a">③ 관계형 DB + 외부 스토리지</text>
    <text x="20" y="54" font-size="11" fill="#64748b">영구 매핑 · 외부 manifest 부트스트랩</text>
    <text x="20" y="76" font-size="11" fill="#64748b">클러스터 cold start</text>
    <text x="20" y="100" font-size="10" font-weight="600" fill="#15803d">restart 후 외부 의존 0</text>
  </g>
  <g transform="translate(1100, 500)">
    <rect width="350" height="120" rx="10" fill="#f8fafc" stroke="#0f172a" stroke-width="1.8"/>
