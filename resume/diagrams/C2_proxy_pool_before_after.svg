<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1500 950" font-family="Pretendard, -apple-system, BlinkMacSystemFont, system-ui, sans-serif">
  <defs>
    <marker id="f-ar" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#0f172a"/>
    </marker>
    <marker id="f-ar-r" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#b91c1c"/>
    </marker>
    <marker id="f-ar-g" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#15803d"/>
    </marker>

    <symbol id="f-worker" viewBox="0 0 48 48">
      <circle cx="24" cy="24" r="10" fill="#ffffff" stroke="#0f172a" stroke-width="2"/>
      <circle cx="24" cy="24" r="3.5" fill="#0f172a"/>
      <g stroke="#0f172a" stroke-width="2.5" stroke-linecap="round">
        <line x1="24" y1="6" x2="24" y2="12"/><line x1="24" y1="36" x2="24" y2="42"/>
        <line x1="6" y1="24" x2="12" y2="24"/><line x1="36" y1="24" x2="42" y2="24"/>
        <line x1="11" y1="11" x2="15.5" y2="15.5"/><line x1="32.5" y1="32.5" x2="37" y2="37"/>
        <line x1="11" y1="37" x2="15.5" y2="32.5"/><line x1="32.5" y1="15.5" x2="37" y2="11"/>
      </g>
    </symbol>
    <symbol id="f-cloud" viewBox="0 0 80 48">
      <path d="M20 36 Q 4 36 4 24 Q 4 14 16 14 Q 18 4 30 4 Q 44 4 46 18 Q 60 16 64 28 Q 76 28 76 38 Q 76 44 68 44 L 22 44 Q 14 44 14 38 Z" fill="#ffffff" stroke="#0f172a" stroke-width="2"/>
    </symbol>
    <symbol id="f-cloud-x" viewBox="0 0 80 60">
      <path d="M20 36 Q 4 36 4 24 Q 4 14 16 14 Q 18 4 30 4 Q 44 4 46 18 Q 60 16 64 28 Q 76 28 76 38 Q 76 44 68 44 L 22 44 Q 14 44 14 38 Z" fill="#ffffff" stroke="#b91c1c" stroke-width="2"/>
      <line x1="22" y1="14" x2="58" y2="44" stroke="#b91c1c" stroke-width="2"/>
      <line x1="58" y1="14" x2="22" y2="44" stroke="#b91c1c" stroke-width="2"/>
    </symbol>
    <symbol id="f-db" viewBox="0 0 48 48">
      <ellipse cx="24" cy="9" rx="18" ry="5" fill="#ffffff" stroke="#0f172a" stroke-width="2"/>
      <path d="M 6 9 L 6 39 Q 6 44 24 44 Q 42 44 42 39 L 42 9" fill="#ffffff" stroke="#0f172a" stroke-width="2"/>
      <ellipse cx="24" cy="20" rx="18" ry="5" fill="none" stroke="#0f172a" stroke-width="1.4"/>
      <ellipse cx="24" cy="31" rx="18" ry="5" fill="none" stroke="#0f172a" stroke-width="1.4"/>
    </symbol>
    <symbol id="f-eye" viewBox="0 0 48 36">
      <path d="M 4 18 Q 24 0 44 18 Q 24 36 4 18 Z" fill="#ffffff" stroke="#0f172a" stroke-width="2"/>
      <circle cx="24" cy="18" r="6" fill="#ffffff" stroke="#0f172a" stroke-width="2"/>
      <circle cx="24" cy="18" r="2.5" fill="#0f172a"/>
