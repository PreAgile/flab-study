    <text x="20" y="76" font-size="11" fill="#64748b">ASN 자동 분류 + KR 가드</text>
    <text x="20" y="94" font-size="11" fill="#64748b">port·IP 평판 trace · Adaptive Cooldown</text>
    <text x="20" y="112" font-size="10" font-weight="600" fill="#15803d">Shadow mode 실험으로 결정 측정</text>
  </g>

  <!-- ===== Hazard catalog ===== -->
  <text x="50" y="660" font-size="16" font-weight="700" fill="#0f172a">시니어 의사결정 — 6개월간 풀어낸 4 hazard</text>

  <g transform="translate(50, 680)">
    <rect width="340" height="110" rx="10" fill="#ffffff" stroke="#0f172a" stroke-width="1.5"/>
    <text x="170" y="28" font-size="13" font-weight="700" fill="#0f172a" text-anchor="middle">① Identifier IP → port 전환</text>
    <text x="170" y="50" font-size="10" fill="#64748b" text-anchor="middle">port↔IP 영구 매핑 3중 저장</text>
    <text x="170" y="68" font-size="10" fill="#64748b" text-anchor="middle">ASN 분류 + KR 가드</text>
    <text x="170" y="92" font-size="11" font-weight="700" fill="#15803d" text-anchor="middle">평판 측정 자체가 다시 가능</text>
  </g>

  <g transform="translate(410, 680)">
    <rect width="340" height="110" rx="10" fill="#ffffff" stroke="#0f172a" stroke-width="1.5"/>
    <text x="170" y="28" font-size="13" font-weight="700" fill="#0f172a" text-anchor="middle">② Cluster CROSSSLOT</text>
    <text x="170" y="50" font-size="10" fill="#64748b" text-anchor="middle">hash tag {pool} 슬롯 강제</text>
    <text x="170" y="68" font-size="10" fill="#64748b" text-anchor="middle">(queue 모듈과 반대 정책)</text>
    <text x="170" y="92" font-size="11" font-weight="700" fill="#15803d" text-anchor="middle">CROSSSLOT 에러 0건</text>
  </g>

  <g transform="translate(770, 680)">
    <rect width="340" height="110" rx="10" fill="#ffffff" stroke="#0f172a" stroke-width="1.5"/>
    <text x="170" y="28" font-size="13" font-weight="700" fill="#0f172a" text-anchor="middle">③ Pool exhausted fallback</text>
    <text x="170" y="50" font-size="10" fill="#64748b" text-anchor="middle">legacy 도 blocklist 필터</text>
    <text x="170" y="68" font-size="10" fill="#64748b" text-anchor="middle">외부 AI 코드 리뷰 3회 정밀화</text>
    <text x="170" y="92" font-size="11" font-weight="700" fill="#15803d" text-anchor="middle">차단 IP 재할당 사고 0건</text>
  </g>

  <g transform="translate(1130, 680)">
