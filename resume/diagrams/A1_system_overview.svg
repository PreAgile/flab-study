<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1500 950" font-family="Pretendard, -apple-system, BlinkMacSystemFont, system-ui, sans-serif">
  <defs>
    <marker id="ar" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#0f172a"/>
    </marker>
    <marker id="ar-dim" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#94a3b8"/>
    </marker>

    <!-- ===== Infra Icons ===== -->
    <!-- User icon -->
    <symbol id="ic-user" viewBox="0 0 48 48">
      <circle cx="24" cy="16" r="9" fill="#ffffff" stroke="#0f172a" stroke-width="2"/>
      <path d="M6 44 C 6 30, 42 30, 42 44" fill="#ffffff" stroke="#0f172a" stroke-width="2"/>
    </symbol>
    <!-- Cloud icon -->
    <symbol id="ic-cloud" viewBox="0 0 80 48">
      <path d="M20 36 Q 4 36 4 24 Q 4 14 16 14 Q 18 4 30 4 Q 44 4 46 18 Q 60 16 64 28 Q 76 28 76 38 Q 76 44 68 44 L 22 44 Q 14 44 14 38 Z" fill="#ffffff" stroke="#0f172a" stroke-width="2"/>
    </symbol>
    <!-- Server (rack) icon -->
    <symbol id="ic-server" viewBox="0 0 48 48">
      <rect x="4" y="6" width="40" height="36" rx="3" fill="#ffffff" stroke="#0f172a" stroke-width="2"/>
      <line x1="4" y1="18" x2="44" y2="18" stroke="#0f172a" stroke-width="1.5"/>
      <line x1="4" y1="30" x2="44" y2="30" stroke="#0f172a" stroke-width="1.5"/>
      <circle cx="10" cy="12" r="1.6" fill="#0f172a"/>
      <circle cx="10" cy="24" r="1.6" fill="#0f172a"/>
      <circle cx="10" cy="36" r="1.6" fill="#0f172a"/>
      <line x1="18" y1="12" x2="40" y2="12" stroke="#94a3b8" stroke-width="1.4"/>
      <line x1="18" y1="24" x2="40" y2="24" stroke="#94a3b8" stroke-width="1.4"/>
      <line x1="18" y1="36" x2="40" y2="36" stroke="#94a3b8" stroke-width="1.4"/>
    </symbol>
    <!-- DB cylinder icon -->
    <symbol id="ic-db" viewBox="0 0 48 48">
      <ellipse cx="24" cy="9" rx="18" ry="5" fill="#ffffff" stroke="#0f172a" stroke-width="2"/>
      <path d="M 6 9 L 6 39 Q 6 44 24 44 Q 42 44 42 39 L 42 9" fill="#ffffff" stroke="#0f172a" stroke-width="2"/>
      <ellipse cx="24" cy="20" rx="18" ry="5" fill="none" stroke="#0f172a" stroke-width="1.4"/>
      <ellipse cx="24" cy="31" rx="18" ry="5" fill="none" stroke="#0f172a" stroke-width="1.4"/>
    </symbol>
    <!-- Cache (hexagon stack) icon -->
    <symbol id="ic-cache" viewBox="0 0 48 48">
      <ellipse cx="24" cy="10" rx="16" ry="5" fill="#ffffff" stroke="#0f172a" stroke-width="2"/>
      <path d="M 8 10 L 8 38 Q 8 43 24 43 Q 40 43 40 38 L 40 10" fill="#ffffff" stroke="#0f172a" stroke-width="2"/>
      <ellipse cx="24" cy="22" rx="16" ry="5" fill="none" stroke="#94a3b8" stroke-width="1.2" stroke-dasharray="3 2"/>
      <text x="24" y="34" font-size="9" font-weight="700" font-family="sans-serif" fill="#0f172a" text-anchor="middle">CACHE</text>
    </symbol>
    <!-- Queue (envelope stack) icon -->
    <symbol id="ic-queue" viewBox="0 0 64 48">
      <rect x="4" y="14" width="42" height="26" rx="2" fill="#ffffff" stroke="#0f172a" stroke-width="2"/>
      <rect x="10" y="10" width="42" height="26" rx="2" fill="#ffffff" stroke="#0f172a" stroke-width="2"/>
      <rect x="16" y="6" width="42" height="26" rx="2" fill="#ffffff" stroke="#0f172a" stroke-width="2"/>
      <path d="M 16 6 L 37 22 L 58 6" fill="none" stroke="#0f172a" stroke-width="1.5"/>
    </symbol>
    <!-- Worker (gear) icon -->
    <symbol id="ic-worker" viewBox="0 0 48 48">
      <circle cx="24" cy="24" r="10" fill="#ffffff" stroke="#0f172a" stroke-width="2"/>
      <circle cx="24" cy="24" r="3.5" fill="#0f172a"/>
      <g stroke="#0f172a" stroke-width="2.5" stroke-linecap="round">
        <line x1="24" y1="6" x2="24" y2="12"/>
        <line x1="24" y1="36" x2="24" y2="42"/>
        <line x1="6" y1="24" x2="12" y2="24"/>
        <line x1="36" y1="24" x2="42" y2="24"/>
        <line x1="11" y1="11" x2="15.5" y2="15.5"/>
        <line x1="32.5" y1="32.5" x2="37" y2="37"/>
        <line x1="11" y1="37" x2="15.5" y2="32.5"/>
        <line x1="32.5" y1="15.5" x2="37" y2="11"/>
      </g>
    </symbol>
    <!-- Browser icon -->
    <symbol id="ic-browser" viewBox="0 0 48 48">
      <rect x="4" y="8" width="40" height="32" rx="2" fill="#ffffff" stroke="#0f172a" stroke-width="2"/>
      <line x1="4" y1="18" x2="44" y2="18" stroke="#0f172a" stroke-width="1.5"/>
      <circle cx="10" cy="13" r="1.6" fill="#0f172a"/>
      <circle cx="15" cy="13" r="1.6" fill="#0f172a"/>
      <circle cx="20" cy="13" r="1.6" fill="#0f172a"/>
    </symbol>
    <!-- Globe / External icon -->
    <symbol id="ic-globe" viewBox="0 0 48 48">
      <circle cx="24" cy="24" r="18" fill="#ffffff" stroke="#0f172a" stroke-width="2"/>
      <ellipse cx="24" cy="24" rx="18" ry="8" fill="none" stroke="#0f172a" stroke-width="1.4"/>
      <ellipse cx="24" cy="24" rx="8" ry="18" fill="none" stroke="#0f172a" stroke-width="1.4"/>
      <line x1="6" y1="24" x2="42" y2="24" stroke="#0f172a" stroke-width="1.4"/>
    </symbol>
    <!-- Eye / observability icon -->
    <symbol id="ic-eye" viewBox="0 0 48 36">
      <path d="M 4 18 Q 24 0 44 18 Q 24 36 4 18 Z" fill="#ffffff" stroke="#0f172a" stroke-width="2"/>
      <circle cx="24" cy="18" r="6" fill="#ffffff" stroke="#0f172a" stroke-width="2"/>
      <circle cx="24" cy="18" r="2.5" fill="#0f172a"/>
    </symbol>
  </defs>

  <rect width="1500" height="950" fill="#ffffff"/>

  <!-- Title -->
  <text x="50" y="48" font-size="24" font-weight="700" fill="#0f172a">A1. 리뷰 통합 관리 SaaS — 시스템 아키텍처</text>
  <text x="50" y="76" font-size="14" fill="#64748b">4 책임 도메인 · 6 외부 플랫폼 통합 · 멀티 인스턴스 · 멀티 워커 풀</text>

  <!-- ===== Client Tier ===== -->
  <use href="#ic-user" x="100" y="130" width="60" height="60"/>
  <text x="130" y="208" font-size="13" font-weight="600" fill="#0f172a" text-anchor="middle">사용자</text>
  <text x="130" y="226" font-size="11" fill="#64748b" text-anchor="middle">웹앱 · BIZ 대시보드</text>

  <!-- Arrow user → LB -->
  <line x1="170" y1="160" x2="278" y2="160" stroke="#0f172a" stroke-width="1.6" marker-end="url(#ar)"/>

  <!-- ===== Edge (Load Balancer + Auth) ===== -->
  <rect x="280" y="130" width="180" height="80" rx="10" fill="#f8fafc" stroke="#0f172a" stroke-width="2"/>
  <text x="370" y="158" font-size="14" font-weight="700" fill="#0f172a" text-anchor="middle">Edge</text>
  <text x="370" y="178" font-size="11" fill="#475569" text-anchor="middle">L7 Load Balancer</text>
  <text x="370" y="194" font-size="11" fill="#475569" text-anchor="middle">JWT(RS256) · OAuth · WAF</text>

  <!-- Arrow LB → Services -->
  <line x1="460" y1="170" x2="540" y2="170" stroke="#0f172a" stroke-width="1.6" marker-end="url(#ar)"/>

  <!-- ===== Service tier — 4 책임 도메인 (큰 박스 1개) ===== -->
  <rect x="540" y="100" width="600" height="240" rx="14" fill="#ffffff" stroke="#0f172a" stroke-width="2.5"/>
  <text x="840" y="130" font-size="16" font-weight="700" fill="#0f172a" text-anchor="middle">4 책임 도메인 (멀티 인스턴스)</text>

  <!-- Service 1: 메인 API -->
  <g transform="translate(560, 150)">
    <use href="#ic-server" x="0" y="0" width="40" height="40"/>
    <text x="50" y="18" font-size="13" font-weight="700" fill="#0f172a">메인 API</text>
    <text x="50" y="34" font-size="11" fill="#475569">결제 · 쿠폰 · 알림톡 · 멀티테넌트</text>
  </g>

  <!-- Service 2: 배치 워커 -->
  <g transform="translate(860, 150)">
    <use href="#ic-server" x="0" y="0" width="40" height="40"/>
    <text x="50" y="18" font-size="13" font-weight="700" fill="#0f172a">배치 워커</text>
    <text x="50" y="34" font-size="11" fill="#475569">2h cron · AI 스코어링 · 8색 배포</text>
  </g>

  <!-- Service 3: 운영 콘솔 -->
  <g transform="translate(560, 240)">
    <use href="#ic-server" x="0" y="0" width="40" height="40"/>
    <text x="50" y="18" font-size="13" font-weight="700" fill="#0f172a">운영 콘솔 API</text>
    <text x="50" y="34" font-size="11" fill="#475569">작업 오케스트레이션 · BIZ 대시보드</text>
  </g>

  <!-- Service 4: 스크래퍼 워커 -->
  <g transform="translate(860, 240)">
    <use href="#ic-worker" x="0" y="0" width="40" height="40"/>
    <text x="50" y="18" font-size="13" font-weight="700" fill="#0f172a">스크래퍼 워커</text>
    <text x="50" y="34" font-size="11" fill="#475569">플랫폼당 30+ · 봇 탐지 우회</text>
  </g>

  <!-- ===== Data Tier ===== -->
  <text x="50" y="430" font-size="14" font-weight="700" fill="#0f172a">데이터 / 메시징</text>

  <!-- DB -->
  <g transform="translate(120, 460)">
    <use href="#ic-db" x="0" y="0" width="80" height="80"/>
    <text x="40" y="100" font-size="13" font-weight="700" fill="#0f172a" text-anchor="middle">관계형 DB</text>
    <text x="40" y="118" font-size="11" fill="#475569" text-anchor="middle">Cluster · Replica</text>
    <text x="40" y="134" font-size="11" fill="#475569" text-anchor="middle">큐 테이블 · VIEW SSOT</text>
  </g>

  <!-- Cache -->
  <g transform="translate(310, 460)">
    <use href="#ic-cache" x="0" y="0" width="80" height="80"/>
    <text x="40" y="100" font-size="13" font-weight="700" fill="#0f172a" text-anchor="middle">분산 캐시</text>
    <text x="40" y="118" font-size="11" fill="#475569" text-anchor="middle">Cluster 모드</text>
    <text x="40" y="134" font-size="11" fill="#475569" text-anchor="middle">분산 락 · Token Bucket</text>
  </g>

  <!-- Queue -->
  <g transform="translate(500, 460)">
    <use href="#ic-queue" x="0" y="0" width="100" height="80"/>
    <text x="50" y="100" font-size="13" font-weight="700" fill="#0f172a" text-anchor="middle">메시지 큐</text>
    <text x="50" y="118" font-size="11" fill="#475569" text-anchor="middle">Quorum + DLQ</text>
    <text x="50" y="134" font-size="11" fill="#475569" text-anchor="middle">application-level retry</text>
  </g>

  <!-- ===== Domain Patterns ===== -->
  <text x="700" y="430" font-size="14" font-weight="700" fill="#0f172a">도메인 패턴 (스크래퍼 워커)</text>

  <rect x="700" y="450" width="440" height="160" rx="10" fill="#f8fafc" stroke="#0f172a" stroke-width="1.8"/>

  <g transform="translate(720, 470)">
    <circle cx="14" cy="14" r="14" fill="#0f172a"/>
    <text x="14" y="18" font-size="11" font-weight="700" fill="#ffffff" text-anchor="middle">1</text>
    <text x="38" y="12" font-size="12" font-weight="700" fill="#0f172a">세션 락 레지스트리</text>
    <text x="38" y="28" font-size="10" fill="#64748b">FIFO + Lease TTL + Cold-Start Guard</text>
  </g>

  <g transform="translate(720, 510)">
    <circle cx="14" cy="14" r="14" fill="#0f172a"/>
    <text x="14" y="18" font-size="11" font-weight="700" fill="#ffffff" text-anchor="middle">2</text>
    <text x="38" y="12" font-size="12" font-weight="700" fill="#0f172a">Single-Flight Coordinator</text>
    <text x="38" y="28" font-size="10" fill="#64748b">Hexagonal · Decorator 5종 · 행동 계약 spec</text>
  </g>

  <g transform="translate(720, 550)">
    <circle cx="14" cy="14" r="14" fill="#0f172a"/>
    <text x="14" y="18" font-size="11" font-weight="700" fill="#ffffff" text-anchor="middle">3</text>
    <text x="38" y="12" font-size="12" font-weight="700" fill="#0f172a">Akamai 우회 엔진</text>
    <text x="38" y="28" font-size="10" fill="#64748b">인증 쿠키 4-state · Referrer Warming · Click Loop</text>
  </g>

  <g transform="translate(720, 590)">
    <circle cx="14" cy="14" r="14" fill="#0f172a"/>
    <text x="14" y="14" font-size="11" font-weight="700" fill="#ffffff" text-anchor="middle">4</text>
  </g>
  <text x="758" y="602" font-size="12" font-weight="700" fill="#0f172a">자체 IP 평판 시스템</text>
  <text x="758" y="618" font-size="10" fill="#64748b">port↔IP 매핑 3중 · Adaptive Cooldown · 이중 blocklist</text>

  <!-- ===== External platforms ===== -->
  <use href="#ic-cloud" x="1200" y="170" width="220" height="120"/>
  <text x="1310" y="320" font-size="13" font-weight="700" fill="#0f172a" text-anchor="middle">6 외부 플랫폼</text>
  <text x="1310" y="338" font-size="11" fill="#475569" text-anchor="middle">검색 포털 · 배달앱 A·B·C·D</text>
  <text x="1310" y="354" font-size="11" fill="#475569" text-anchor="middle">결제 PG · 알림톡 SaaS</text>

  <line x1="1140" y1="220" x2="1196" y2="220" stroke="#0f172a" stroke-width="1.6" marker-end="url(#ar)"/>

  <!-- ===== Observability ===== -->
  <rect x="1200" y="450" width="240" height="160" rx="10" fill="#ffffff" stroke="#64748b" stroke-width="1.8" stroke-dasharray="6 4"/>
  <use href="#ic-eye" x="1295" y="470" width="50" height="38"/>
  <text x="1320" y="528" font-size="13" font-weight="700" fill="#0f172a" text-anchor="middle">관측성 / 알림</text>

  <text x="1218" y="555" font-size="11" fill="#475569">▸ APM (span tagging)</text>
  <text x="1218" y="573" font-size="11" fill="#475569">▸ 메트릭 · 대시보드</text>
  <text x="1218" y="591" font-size="11" fill="#475569">▸ Slack Webhook · 자동 알림</text>

  <!-- ===== Arrows: Service tier → Data tier ===== -->
  <line x1="840" y1="340" x2="200" y2="455" stroke="#0f172a" stroke-width="1.4" marker-end="url(#ar)"/>
  <line x1="840" y1="340" x2="390" y2="455" stroke="#0f172a" stroke-width="1.4" marker-end="url(#ar)"/>
  <line x1="840" y1="340" x2="580" y2="455" stroke="#0f172a" stroke-width="1.4" marker-end="url(#ar)"/>

  <!-- Service tier → External -->
  <line x1="1140" y1="220" x2="1196" y2="220" stroke="#0f172a" stroke-width="1.6" marker-end="url(#ar)"/>

  <!-- Service tier → Observability (dim) -->
  <line x1="900" y1="340" x2="1280" y2="448" stroke="#94a3b8" stroke-width="1.2" stroke-dasharray="4 4" marker-end="url(#ar-dim)"/>

  <!-- ===== Bottom: 핵심 운영 지표 ===== -->
  <rect x="50" y="680" width="1400" height="220" rx="12" fill="#f8fafc" stroke="#0f172a" stroke-width="2"/>
  <text x="70" y="712" font-size="16" font-weight="700" fill="#0f172a">운영 규모 · 핵심 성과 지표</text>

  <!-- KPI cards -->
  <g transform="translate(70, 728)">
    <rect width="260" height="76" rx="8" fill="#ffffff" stroke="#0f172a" stroke-width="1.4"/>
    <text x="130" y="22" font-size="11" font-weight="600" fill="#64748b" text-anchor="middle">일평균 처리량</text>
    <text x="130" y="46" font-size="18" font-weight="700" fill="#0f172a" text-anchor="middle">API 20만 · Scrape 100만</text>
    <text x="130" y="66" font-size="11" fill="#64748b" text-anchor="middle">리뷰 수집 12만 건</text>
  </g>

  <g transform="translate(345, 728)">
    <rect width="260" height="76" rx="8" fill="#ffffff" stroke="#0f172a" stroke-width="1.4"/>
    <text x="130" y="22" font-size="11" font-weight="600" fill="#64748b" text-anchor="middle">프록시 풀 비용</text>
    <text x="130" y="50" font-size="22" font-weight="700" fill="#15803d" text-anchor="middle">−88.75%</text>
    <text x="130" y="66" font-size="11" fill="#64748b" text-anchor="middle">월 800만 → 90만</text>
  </g>

  <g transform="translate(620, 728)">
    <rect width="260" height="76" rx="8" fill="#ffffff" stroke="#0f172a" stroke-width="1.4"/>
    <text x="130" y="22" font-size="11" font-weight="600" fill="#64748b" text-anchor="middle">요청 성공률</text>
    <text x="130" y="50" font-size="22" font-weight="700" fill="#15803d" text-anchor="middle">70% → 98%</text>
    <text x="130" y="66" font-size="11" fill="#64748b" text-anchor="middle">프록시 전환 후</text>
  </g>

  <g transform="translate(895, 728)">
    <rect width="260" height="76" rx="8" fill="#ffffff" stroke="#0f172a" stroke-width="1.4"/>
    <text x="130" y="22" font-size="11" font-weight="600" fill="#64748b" text-anchor="middle">세션 유지율 (6개월)</text>
    <text x="130" y="50" font-size="22" font-weight="700" fill="#0f172a" text-anchor="middle">99.2%</text>
    <text x="130" y="66" font-size="11" fill="#64748b" text-anchor="middle">댓글 등록 중복 0건</text>
  </g>

  <g transform="translate(1170, 728)">
    <rect width="260" height="76" rx="8" fill="#ffffff" stroke="#0f172a" stroke-width="1.4"/>
    <text x="130" y="22" font-size="11" font-weight="600" fill="#64748b" text-anchor="middle">Akamai 로그인 성공률</text>
    <text x="130" y="50" font-size="22" font-weight="700" fill="#15803d" text-anchor="middle">77.8% → 100%</text>
    <text x="130" y="66" font-size="11" fill="#64748b" text-anchor="middle">18/18 iter 측정 입증</text>
  </g>

  <!-- 둘째 줄 — 운영 문화 -->
  <g transform="translate(70, 816)">
    <rect width="535" height="60" rx="8" fill="#ffffff" stroke="#0f172a" stroke-width="1.4"/>
    <text x="20" y="24" font-size="12" font-weight="700" fill="#0f172a">운영 입증 데이터</text>
    <text x="20" y="44" font-size="11" fill="#475569">▸ 「중복 웹훅 락 차단」 / 「Optimistic lock failed」 운영 로그에 정기 검출 — race 차단 입증</text>
  </g>

  <g transform="translate(620, 816)">
    <rect width="535" height="60" rx="8" fill="#ffffff" stroke="#0f172a" stroke-width="1.4"/>
    <text x="20" y="24" font-size="12" font-weight="700" fill="#0f172a">오픈소스 기여</text>
    <text x="20" y="44" font-size="11" fill="#475569">▸ Kotest 6 PR (organization member)  ·  Armeria 1 PR  ·  Spring Batch 1 PR</text>
  </g>

  <g transform="translate(1170, 816)">
    <rect width="260" height="60" rx="8" fill="#ffffff" stroke="#0f172a" stroke-width="1.4"/>
    <text x="130" y="24" font-size="12" font-weight="700" fill="#0f172a" text-anchor="middle">CROSSSLOT 사고</text>
    <text x="130" y="46" font-size="20" font-weight="700" fill="#15803d" text-anchor="middle">0건</text>
  </g>

  <!-- Footer note -->
  <text x="50" y="920" font-size="11" fill="#94a3b8">실선 — 호출 / 데이터 경로     점선 — 관측성(metric · log · trace)</text>
</svg>
