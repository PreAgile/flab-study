<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1500 950" font-family="Pretendard, -apple-system, BlinkMacSystemFont, system-ui, sans-serif">
  <defs>
    <marker id="c-ar" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#0f172a"/>
    </marker>
    <marker id="c-ar-g" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#15803d"/>
    </marker>
    <marker id="c-ar-r" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#b91c1c"/>
    </marker>

    <symbol id="d-user" viewBox="0 0 48 48">
      <circle cx="24" cy="16" r="9" fill="#ffffff" stroke="#0f172a" stroke-width="2"/>
      <path d="M6 44 C 6 30, 42 30, 42 44" fill="#ffffff" stroke="#0f172a" stroke-width="2"/>
    </symbol>
    <symbol id="d-db" viewBox="0 0 48 48">
      <ellipse cx="24" cy="9" rx="18" ry="5" fill="#ffffff" stroke="#0f172a" stroke-width="2"/>
      <path d="M 6 9 L 6 39 Q 6 44 24 44 Q 42 44 42 39 L 42 9" fill="#ffffff" stroke="#0f172a" stroke-width="2"/>
      <ellipse cx="24" cy="20" rx="18" ry="5" fill="none" stroke="#0f172a" stroke-width="1.4"/>
      <ellipse cx="24" cy="31" rx="18" ry="5" fill="none" stroke="#0f172a" stroke-width="1.4"/>
    </symbol>
    <symbol id="d-cache" viewBox="0 0 48 48">
      <ellipse cx="24" cy="10" rx="16" ry="5" fill="#ffffff" stroke="#0f172a" stroke-width="2"/>
      <path d="M 8 10 L 8 38 Q 8 43 24 43 Q 40 43 40 38 L 40 10" fill="#ffffff" stroke="#0f172a" stroke-width="2"/>
      <text x="24" y="32" font-size="9" font-weight="700" font-family="sans-serif" fill="#0f172a" text-anchor="middle">CACHE</text>
    </symbol>
    <symbol id="d-worker" viewBox="0 0 48 48">
      <circle cx="24" cy="24" r="10" fill="#ffffff" stroke="#0f172a" stroke-width="2"/>
      <circle cx="24" cy="24" r="3.5" fill="#0f172a"/>
      <g stroke="#0f172a" stroke-width="2.5" stroke-linecap="round">
        <line x1="24" y1="6" x2="24" y2="12"/><line x1="24" y1="36" x2="24" y2="42"/>
        <line x1="6" y1="24" x2="12" y2="24"/><line x1="36" y1="24" x2="42" y2="24"/>
        <line x1="11" y1="11" x2="15.5" y2="15.5"/><line x1="32.5" y1="32.5" x2="37" y2="37"/>
        <line x1="11" y1="37" x2="15.5" y2="32.5"/><line x1="32.5" y1="15.5" x2="37" y2="11"/>
      </g>
    </symbol>
    <symbol id="d-cloud" viewBox="0 0 80 48">
      <path d="M20 36 Q 4 36 4 24 Q 4 14 16 14 Q 18 4 30 4 Q 44 4 46 18 Q 60 16 64 28 Q 76 28 76 38 Q 76 44 68 44 L 22 44 Q 14 44 14 38 Z" fill="#ffffff" stroke="#0f172a" stroke-width="2"/>
    </symbol>
  </defs>

  <rect width="1500" height="950" fill="#ffffff"/>

  <!-- Title -->
  <text x="50" y="48" font-size="24" font-weight="700" fill="#0f172a">B1. 관계형 DB 를 큐로 — CAS 기반 분산 작업 큐</text>
  <text x="50" y="76" font-size="14" fill="#64748b">「MySQL is the queue」  ·  낙관락 CAS · 같은 플랫폼 계정 직렬화 · 좀비 작업 자동 복구</text>

  <!-- ===== User / API ===== -->
  <use href="#d-user" x="60" y="130" width="64" height="64"/>
  <text x="92" y="216" font-size="13" font-weight="600" fill="#0f172a" text-anchor="middle">사용자</text>
  <text x="92" y="234" font-size="11" fill="#64748b" text-anchor="middle">일괄 100~1,000건</text>

  <line x1="130" y1="160" x2="208" y2="160" stroke="#0f172a" stroke-width="1.8" marker-end="url(#c-ar)"/>

  <rect x="210" y="120" width="220" height="100" rx="10" fill="#ffffff" stroke="#0f172a" stroke-width="2"/>
  <text x="320" y="148" font-size="14" font-weight="700" fill="#0f172a" text-anchor="middle">일괄 API</text>
  <text x="320" y="172" font-size="11" fill="#475569" text-anchor="middle">중복 트리거 가드</text>
  <text x="320" y="190" font-size="11" fill="#475569" text-anchor="middle">N 작업 INSERT (트랜잭션)</text>
  <text x="320" y="208" font-size="10" fill="#15803d" text-anchor="middle">활성 그룹 존재 시 409 차단</text>

  <line x1="430" y1="170" x2="490" y2="170" stroke="#0f172a" stroke-width="1.8" marker-end="url(#c-ar)"/>

  <!-- ===== Big DB icon — Queue Table ===== -->
  <use href="#d-db" x="500" y="100" width="160" height="160"/>
  <text x="580" y="290" font-size="15" font-weight="700" fill="#0f172a" text-anchor="middle">관계형 DB</text>
  <text x="580" y="308" font-size="12" fill="#475569" text-anchor="middle">queue_jobs 테이블</text>
  <text x="580" y="324" font-size="11" fill="#64748b" text-anchor="middle">트랜잭션 + 큐 = 한 곳</text>

  <!-- DB row table (small) -->
  <g transform="translate(50, 350)">
    <rect width="1140" height="170" rx="8" fill="#f8fafc" stroke="#0f172a" stroke-width="1.5"/>
    <text x="20" y="26" font-size="13" font-weight="700" fill="#0f172a">queue_jobs — 현재 상태 (scan 결과 일부)</text>

    <!-- header -->
    <g transform="translate(20, 42)" font-size="11" font-weight="700" fill="#475569">
      <text x="0" y="20">id</text>
      <text x="80" y="20">status</text>
      <text x="220" y="20">platform_id</text>
      <text x="370" y="20">group_id</text>
      <text x="510" y="20">updated_at (= version)</text>
      <text x="780" y="20">instance</text>
      <text x="940" y="20">비고</text>
      <line x1="-10" y1="28" x2="1110" y2="28" stroke="#cbd5e1" stroke-width="1"/>
    </g>

    <!-- rows -->
    <g transform="translate(20, 90)" font-size="11" fill="#0f172a">
      <text x="0" y="0">101</text>
      <text x="80" y="0" font-weight="700" fill="#15803d">IN_PROGRESS</text>
      <text x="220" y="0">PA-A</text>
      <text x="370" y="0">G-1</text>
      <text x="510" y="0">10:02:31.143</text>
      <text x="780" y="0">[[Task-3]]</text>
      <text x="940" y="0" fill="#64748b">처리 중</text>

      <text x="0" y="24">102</text>
      <text x="80" y="24" font-weight="700" fill="#475569">WAITING</text>
      <text x="220" y="24">PA-A</text>
      <text x="370" y="24">G-1</text>
      <text x="510" y="24">10:01:55.067</text>
      <text x="780" y="24">—</text>
      <text x="940" y="24" fill="#64748b">같은 platform_id → 대기</text>

      <text x="0" y="48">103</text>
      <text x="80" y="48" font-weight="700" fill="#15803d">IN_PROGRESS</text>
      <text x="220" y="48">PA-B</text>
      <text x="370" y="48">G-1</text>
      <text x="510" y="48">10:02:33.221</text>
      <text x="780" y="48">[[Task-1]]</text>
      <text x="940" y="48" fill="#64748b">다른 계정 → 병렬</text>
    </g>
  </g>

  <!-- ===== Worker Pool ===== -->
  <text x="50" y="570" font-size="16" font-weight="700" fill="#0f172a">분산 워커 풀 (N 인스턴스) — 안전 픽업</text>

  <g transform="translate(50, 590)">
    <use href="#d-worker" x="0" y="0" width="56" height="56"/>
    <text x="28" y="80" font-size="12" font-weight="700" fill="#0f172a" text-anchor="middle">Worker 1</text>
    <text x="28" y="98" font-size="10" fill="#64748b" text-anchor="middle">id=103 picked ✓</text>
  </g>
  <g transform="translate(180, 590)">
    <use href="#d-worker" x="0" y="0" width="56" height="56"/>
    <text x="28" y="80" font-size="12" font-weight="700" fill="#0f172a" text-anchor="middle">Worker 2</text>
    <text x="28" y="98" font-size="10" fill="#b91c1c" text-anchor="middle">CAS 실패 (race)</text>
  </g>
  <g transform="translate(310, 590)">
    <use href="#d-worker" x="0" y="0" width="56" height="56"/>
    <text x="28" y="80" font-size="12" font-weight="700" fill="#0f172a" text-anchor="middle">Worker N</text>
    <text x="28" y="98" font-size="10" fill="#64748b" text-anchor="middle">id=102 picked ✓</text>
  </g>

  <!-- CAS box -->
  <rect x="440" y="588" width="730" height="80" rx="10" fill="#ffffff" stroke="#0f172a" stroke-width="2"/>
  <text x="460" y="612" font-size="14" font-weight="700" fill="#0f172a">낙관락 CAS — UPDATE WHERE status=WAITING AND updated_at=원본</text>
  <text x="460" y="634" font-size="11" fill="#475569">▸ affected = 0 → 다른 인스턴스가 먼저 가져감 (&quot;Optimistic lock failed&quot; 로그)</text>
  <text x="460" y="652" font-size="11" fill="#15803d">▸ affected = 1 → 픽업 성공 · status=IN_PROGRESS 로 전환  (Compare-And-Set SQL 버전)</text>

  <!-- Worker → DB -->
  <line x1="240" y1="590" x2="540" y2="500" stroke="#0f172a" stroke-width="1.4" marker-end="url(#c-ar)"/>

  <!-- Worker → External -->
  <use href="#d-cloud" x="1280" y="600" width="180" height="100"/>
  <text x="1370" y="720" font-size="13" font-weight="700" fill="#0f172a" text-anchor="middle">외부 플랫폼</text>
  <text x="1370" y="738" font-size="11" fill="#64748b" text-anchor="middle">댓글 등록 1건 ≈ 3~5분 IO</text>
  <text x="1370" y="756" font-size="11" font-weight="700" fill="#15803d" text-anchor="middle">중복 댓글 0건 (운영 입증)</text>

  <line x1="1170" y1="624" x2="1276" y2="640" stroke="#0f172a" stroke-width="1.8" marker-end="url(#c-ar)"/>

  <!-- Worker → Cache (진행률) -->
  <use href="#d-cache" x="1280" y="430" width="80" height="80"/>
  <text x="1320" y="540" font-size="12" font-weight="700" fill="#0f172a" text-anchor="middle">분산 캐시</text>
  <text x="1320" y="556" font-size="10" fill="#64748b" text-anchor="middle">진행률 폴링 부하 분산</text>

  <line x1="1190" y1="500" x2="1276" y2="470" stroke="#0f172a" stroke-width="1.4" marker-end="url(#c-ar)"/>
  <line x1="124" y1="160" x2="1280" y2="450" stroke="#94a3b8" stroke-width="1.2" stroke-dasharray="5 4" marker-end="url(#c-ar)"/>
  <text x="900" y="240" font-size="10" fill="#94a3b8" font-style="italic">사용자 폴링 — 캐시 read-through</text>

  <!-- ===== 픽업 SQL — 같은 플랫폼 계정 직렬화 ===== -->
  <rect x="50" y="700" width="700" height="120" rx="10" fill="#ffffff" stroke="#0f172a" stroke-width="2"/>
  <text x="70" y="728" font-size="14" font-weight="700" fill="#0f172a">픽업 SQL — 같은 플랫폼 계정 직렬화</text>
  <text x="70" y="752" font-size="12" fill="#0f172a">  WHERE status = WAITING</text>
  <text x="70" y="772" font-size="12" fill="#0f172a">    AND group_id NOT IN (실행 중 그룹)</text>
  <text x="70" y="792" font-size="12" fill="#0f172a">    AND platform_id NOT IN (실행 중 플랫폼 계정)</text>
  <text x="70" y="810" font-size="11" font-weight="700" fill="#15803d">→ 같은 계정으로 동시 외부 로그인 0건 · 봇 탐지 회피</text>

  <!-- ===== 좀비 복구 ===== -->
  <rect x="770" y="700" width="400" height="120" rx="10" fill="#ffffff" stroke="#0f172a" stroke-width="2"/>
  <text x="790" y="728" font-size="14" font-weight="700" fill="#0f172a">좀비 작업 자동 복구</text>
  <text x="790" y="752" font-size="11" fill="#475569">▸ 부팅 시 WAITING / IN_PROGRESS 재스케줄</text>
  <text x="790" y="770" font-size="11" fill="#475569">▸ 인스턴스 ID 를 statusMessage 에 박음</text>
  <text x="790" y="788" font-size="11" fill="#475569">▸ 1분 health check + 30s consumer check</text>
  <text x="790" y="808" font-size="11" font-weight="700" fill="#15803d">→ OOM/SIGKILL 시에도 다음 cron 정상</text>

  <!-- ===== Result ===== -->
  <rect x="50" y="840" width="1400" height="80" rx="10" fill="#f8fafc" stroke="#0f172a" stroke-width="1.8"/>
  <text x="70" y="868" font-size="14" font-weight="700" fill="#0f172a">운영 검증 결과</text>
  <text x="70" y="892" font-size="11" fill="#0f172a">▸ 동시 처리 워커 최대 30  ·  외부 플랫폼 중복 댓글 0건  ·  인스턴스 재배포 무중단  ·  &quot;MySQL is the queue&quot; 검증된 패턴 적용</text>
  <text x="70" y="910" font-size="11" fill="#0f172a">▸ 외부 큐 솔루션 없이 트랜잭션 + 큐 책임을 한 곳에 묶음  ·  CAS(updated_at as version)는 분산 시스템의 표준 패턴</text>
</svg>
