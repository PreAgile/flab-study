  <text x="660" y="248" font-size="11" fill="#475569" text-anchor="middle">차단 / 봇 탐지</text>
  <text x="660" y="266" font-size="11" fill="#475569" text-anchor="middle">↓ 70% 성공률</text>

  <line x1="524" y1="240" x2="578" y2="240" stroke="#b91c1c" stroke-width="2" marker-end="url(#c2-arr-r)"/>

