  <text x="160" y="246" font-size="11" fill="#475569" text-anchor="middle">6 플랫폼</text>
  <text x="160" y="262" font-size="11" fill="#475569" text-anchor="middle">모든 요청</text>

  <!-- External Proxy -->
  <rect x="320" y="200" width="200" height="200" rx="10" fill="#fee2e2" stroke="#b91c1c" stroke-width="2"/>
  <text x="420" y="232" font-size="14" font-weight="700" fill="#7f1d1d" text-anchor="middle">외부 Residential 프록시</text>
  <text x="420" y="252" font-size="11" fill="#475569" text-anchor="middle">Pay-per-GB · 단일 벤더</text>

