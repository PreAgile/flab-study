<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 1040" font-family="Pretendard, -apple-system, BlinkMacSystemFont, system-ui, sans-serif">
  <defs>
    <marker id="c1-arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#0f172a"/>
    </marker>
    <marker id="c1-arr-g" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#15803d"/>
    </marker>
    <marker id="c1-arr-r" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#b91c1c"/>
    </marker>
  </defs>

  <rect width="1600" height="1040" fill="#ffffff"/>

  <!-- Title -->
  <text x="40" y="46" font-size="24" font-weight="700" fill="#0f172a">C1. 세션 락 레지스트리 — 30+ 워커 동시 로그인 race 를 FIFO + Lease TTL + Cold-Start Guard 로 직렬화</text>
  <text x="40" y="74" font-size="14" fill="#64748b">4 layer 직렬화 + Handoff 패턴 + 안전망 3종 — 동일 매장 동시 로그인 0건, 세션 유지율 99.2%</text>

  <!-- ====== Workers ====== -->
  <text x="40" y="118" font-size="14" font-weight="700" fill="#0f172a">분산 워커 (한 매장에 동시 진입)</text>

  <g>
    <rect x="40" y="140" width="120" height="60" rx="8" fill="#fdf2f8" stroke="#9d174d" stroke-width="1.5"/>
    <text x="100" y="164" font-size="13" font-weight="700" fill="#831843" text-anchor="middle">Worker 1</text>
    <text x="100" y="184" font-size="10" fill="#475569" text-anchor="middle">getReviews</text>

    <rect x="40" y="220" width="120" height="60" rx="8" fill="#fdf2f8" stroke="#9d174d" stroke-width="1.5"/>
    <text x="100" y="244" font-size="13" font-weight="700" fill="#831843" text-anchor="middle">Worker 2</text>
    <text x="100" y="264" font-size="10" fill="#475569" text-anchor="middle">addReply</text>

    <rect x="40" y="300" width="120" height="60" rx="8" fill="#fdf2f8" stroke="#9d174d" stroke-width="1.5"/>
    <text x="100" y="324" font-size="13" font-weight="700" fill="#831843" text-anchor="middle">Worker 3</text>
    <text x="100" y="344" font-size="10" fill="#475569" text-anchor="middle">getStores</text>

    <rect x="40" y="380" width="120" height="60" rx="8" fill="#fdf2f8" stroke="#9d174d" stroke-width="1.5"/>
    <text x="100" y="404" font-size="13" font-weight="700" fill="#831843" text-anchor="middle">Worker N</text>
    <text x="100" y="424" font-size="10" fill="#475569" text-anchor="middle">keepAlive</text>
  </g>
  <text x="100" y="468" font-size="11" fill="#475569" text-anchor="middle">(같은 shop_id 에 동시 진입)</text>

  <!-- ====== Central Box: SessionLockRegistry ====== -->
  <rect x="220" y="120" width="900" height="340" rx="12" fill="#eff6ff" stroke="#1d4ed8" stroke-width="2"/>
  <text x="670" y="152" font-size="17" font-weight="700" fill="#1e3a8a" text-anchor="middle">세션 락 레지스트리</text>
  <text x="670" y="172" font-size="12" fill="#475569" text-anchor="middle">shop_id 단위로 4 layer 직렬화 — FIFO 큐 + Lease TTL + Instance-aware lease + Handoff</text>

  <!-- Queue head with lease -->
  <text x="240" y="206" font-size="13" font-weight="700" fill="#1e3a8a">FIFO 큐 (분산 캐시 LIST)</text>

  <!-- Queue items -->
  <g>
    <rect x="240" y="220" width="270" height="80" rx="8" fill="#dcfce7" stroke="#15803d" stroke-width="2"/>
    <text x="375" y="244" font-size="13" font-weight="700" fill="#14532d" text-anchor="middle">[HEAD] Worker 1 — GRANTED</text>
    <text x="375" y="262" font-size="11" fill="#0f172a" text-anchor="middle">Lease 90s TTL · 5s 갱신</text>
    <text x="375" y="280" font-size="11" fill="#0f172a" text-anchor="middle">lease value =</text>
    <text x="375" y="294" font-size="10" font-family="D2Coding, Consolas, monospace" fill="#312e81" text-anchor="middle">{instanceId-UUID} : {Date.now()}</text>

    <rect x="530" y="220" width="180" height="80" rx="8" fill="#f1f5f9" stroke="#475569" stroke-width="1.5"/>
    <text x="620" y="244" font-size="13" font-weight="700" fill="#334155" text-anchor="middle">Worker 2 — QUEUED</text>
    <text x="620" y="266" font-size="11" fill="#475569" text-anchor="middle">position 1</text>
    <text x="620" y="286" font-size="10" fill="#475569" text-anchor="middle">대기 중 (handoff 예정)</text>

    <rect x="730" y="220" width="180" height="80" rx="8" fill="#f1f5f9" stroke="#475569" stroke-width="1.5"/>
    <text x="820" y="244" font-size="13" font-weight="700" fill="#334155" text-anchor="middle">Worker 3 — QUEUED</text>
    <text x="820" y="266" font-size="11" fill="#475569" text-anchor="middle">position 2</text>

    <rect x="930" y="220" width="170" height="80" rx="8" fill="#f1f5f9" stroke="#475569" stroke-width="1.5"/>
    <text x="1015" y="244" font-size="13" font-weight="700" fill="#334155" text-anchor="middle">Worker N — QUEUED</text>
    <text x="1015" y="266" font-size="11" fill="#475569" text-anchor="middle">position …</text>
  </g>

  <!-- Watchdog -->
  <rect x="240" y="318" width="420" height="60" rx="8" fill="#ffffff" stroke="#1d4ed8" stroke-width="1.5"/>
  <text x="260" y="340" font-size="13" font-weight="700" fill="#1e3a8a">Watchdog (2s 주기)</text>
  <text x="260" y="358" font-size="11" fill="#475569">head 의 lease 키 EXISTS=0 → stale 판정 → LREM 1 head → 다음 caller</text>
  <text x="260" y="372" font-size="10" fill="#15803d">→ 옛 인스턴스가 진행을 멈춘 안전망</text>

  <!-- Handle pattern -->
  <rect x="680" y="318" width="420" height="60" rx="8" fill="#ffffff" stroke="#1d4ed8" stroke-width="1.5"/>
  <text x="700" y="340" font-size="13" font-weight="700" fill="#1e3a8a">Handle 패턴 (RAII) + activeCount invariant</text>
  <text x="700" y="358" font-size="11" fill="#475569">attach / release + pendingClose 5종 정책</text>
  <text x="700" y="372" font-size="10" fill="#15803d">→ 다른 worker 활성 시 close 보류, 모든 release 후만 close</text>

  <!-- Handoff arrow -->
  <rect x="240" y="394" width="860" height="56" rx="8" fill="#fffbeb" stroke="#b45309" stroke-width="1.5"/>
  <text x="260" y="416" font-size="13" font-weight="700" fill="#78350f">Handoff Pattern — Worker 1 release 시 Worker 2 가 동일 세션 재사용</text>
  <text x="260" y="436" font-size="11" fill="#475569">→ 외부 플랫폼 재로그인 0회 (IP 평판 보호) ｜ Camoufox 인스턴스 재생성 0회 (1GB+ 메모리 절감)</text>

  <!-- Workers → registry arrows -->
  <line x1="160" y1="170" x2="218" y2="170" stroke="#0f172a" stroke-width="1.5" marker-end="url(#c1-arr)"/>
  <line x1="160" y1="250" x2="218" y2="250" stroke="#0f172a" stroke-width="1.5" marker-end="url(#c1-arr)"/>
  <line x1="160" y1="330" x2="218" y2="330" stroke="#0f172a" stroke-width="1.5" marker-end="url(#c1-arr)"/>
  <line x1="160" y1="410" x2="218" y2="410" stroke="#0f172a" stroke-width="1.5" marker-end="url(#c1-arr)"/>

  <!-- ====== Right side: Browser Pool ====== -->
  <rect x="1160" y="120" width="400" height="340" rx="12" fill="#fdf2f8" stroke="#9d174d" stroke-width="2"/>
  <text x="1360" y="152" font-size="17" font-weight="700" fill="#831843" text-anchor="middle">헤드리스 브라우저 풀</text>
  <text x="1360" y="172" font-size="12" fill="#475569" text-anchor="middle">stealth fork — 1 인스턴스 ≈ 1GB+ · launch 5~10초</text>

  <rect x="1180" y="190" width="360" height="60" rx="8" fill="#ffffff" stroke="#9d174d" stroke-width="1.2"/>
  <text x="1200" y="212" font-size="12" font-weight="700" fill="#831843">Launch Semaphore + Prewarm Pool</text>
  <text x="1200" y="232" font-size="10" fill="#475569">동시 launch 상한 · 미리 띄운 인스턴스 재사용</text>

  <rect x="1180" y="260" width="360" height="60" rx="8" fill="#ffffff" stroke="#9d174d" stroke-width="1.2"/>
  <text x="1200" y="282" font-size="12" font-weight="700" fill="#831843">Quarantine + Zombie Cleanup (5-phase)</text>
  <text x="1200" y="302" font-size="10" fill="#475569">orphan PID 5분 reconcile · 자원 격리</text>

  <rect x="1180" y="330" width="360" height="60" rx="8" fill="#ffffff" stroke="#9d174d" stroke-width="1.2"/>
  <text x="1200" y="352" font-size="12" font-weight="700" fill="#831843">Jittered Watchdog + Idle Timer</text>
  <text x="1200" y="372" font-size="10" fill="#475569">Thundering Herd 회피 · idle 자동 회수</text>

  <text x="1360" y="420" font-size="11" font-weight="700" fill="#15803d" text-anchor="middle">40 concurrent 환경 97.2% 성공률 (로컬)</text>
  <text x="1360" y="436" font-size="11" font-weight="700" fill="#15803d" text-anchor="middle">execution context destroyed 0건</text>

  <line x1="1120" y1="290" x2="1158" y2="290" stroke="#0f172a" stroke-width="1.5" marker-end="url(#c1-arr)"/>

  <!-- ====== Cold-Start Guard ====== -->
  <rect x="40" y="500" width="760" height="240" rx="12" fill="#fef2f2" stroke="#b91c1c" stroke-width="2"/>
  <text x="60" y="530" font-size="16" font-weight="700" fill="#7f1d1d">Cold-Start Guard — 가장 미묘한 hazard 차단</text>
  <text x="60" y="550" font-size="12" fill="#475569">인스턴스 ID 를 lease value 에 박아 cross-instance ownership 을 lease-level 에서 검증 (fencing token 패턴 단순화)</text>

  <line x1="60" y1="558" x2="780" y2="558" stroke="#fecaca" stroke-width="1"/>

  <text x="60" y="582" font-size="13" font-weight="700" fill="#7f1d1d">시나리오 (deadlock 발생 경로)</text>
  <text x="60" y="604" font-size="11" fill="#0f172a">① ECS task 다운 → 큐 head 에는 옛 인스턴스의 requestId 가 남아있음</text>
  <text x="60" y="624" font-size="11" fill="#0f172a">② 새 task 부팅 → in-memory Map 은 비어있음</text>
  <text x="60" y="644" font-size="11" fill="#0f172a">③ 새 worker 가 head 의 차례를 기다림 → 옛 worker 는 죽어서 영원히 release 안 됨</text>
  <text x="60" y="664" font-size="11" font-weight="700" fill="#b91c1c">⇒ 영구 deadlock — dead-letter 큐 누수</text>

  <text x="60" y="694" font-size="13" font-weight="700" fill="#15803d">해결</text>
  <text x="60" y="714" font-size="11" fill="#0f172a">▸ 새 인스턴스 첫 enqueue 시 head 의 lease value prefix 비교 (다르면 옛 인스턴스 잔재 → 큐 통째 비움)</text>
  <text x="60" y="730" font-size="11" font-weight="700" fill="#15803d">⇒ 인스턴스 재시작 후 dead-letter 누수 0건</text>

  <!-- ====== CROSSSLOT Policy ====== -->
  <rect x="820" y="500" width="740" height="240" rx="12" fill="#eef2ff" stroke="#4338ca" stroke-width="2"/>
  <text x="840" y="530" font-size="16" font-weight="700" fill="#312e81">분산 캐시 Cluster 정책 — 모듈별 의도된 분기</text>
  <text x="840" y="550" font-size="12" fill="#475569">같은 시스템 안에서 두 전략을 의도적으로 다르게</text>

  <line x1="840" y1="558" x2="1540" y2="558" stroke="#c7d2fe" stroke-width="1"/>

  <rect x="840" y="572" width="340" height="158" rx="8" fill="#ffffff" stroke="#4338ca" stroke-width="1.5"/>
  <text x="1010" y="596" font-size="13" font-weight="700" fill="#312e81" text-anchor="middle">[Queue 모듈]  단일 키 명령으로 분리</text>
  <text x="860" y="624" font-size="11" fill="#0f172a">▸ broadcastAbort 가 abort / queue / activity</text>
  <text x="860" y="640" font-size="11" fill="#0f172a">  키를 한 MULTI/EXEC 에 묶지 않음</text>
  <text x="860" y="660" font-size="11" fill="#0f172a">▸ 분산 캐시 슬롯에 부하 분산 우선</text>
  <text x="860" y="680" font-size="10" font-weight="700" fill="#15803d">→ CROSSSLOT 회피 + 슬롯 hotspot 방지</text>
  <text x="860" y="712" font-size="11" fill="#475569" font-style="italic">"slot spread &gt; transactional grouping"</text>

  <rect x="1200" y="572" width="340" height="158" rx="8" fill="#ffffff" stroke="#a21caf" stroke-width="1.5"/>
  <text x="1370" y="596" font-size="13" font-weight="700" fill="#701a75" text-anchor="middle">[평판 모듈]  hash tag 로 슬롯 강제 배정</text>
  <text x="1220" y="624" font-size="11" fill="#0f172a">▸ HASH + STREAM + SET + HASH 를</text>
  <text x="1220" y="640" font-size="11" fill="#0f172a">  한 MULTI/EXEC 에 묶어야 정합성</text>
  <text x="1220" y="660" font-size="11" fill="#0f172a">▸ {pool} hash tag 로 같은 슬롯 강제</text>
  <text x="1220" y="680" font-size="10" font-weight="700" fill="#15803d">→ 트랜잭션 묶음 우선 (사례 10 참고)</text>
  <text x="1220" y="712" font-size="11" fill="#475569" font-style="italic">"transactional grouping &gt; slot spread"</text>

  <!-- ====== Safety Net + Metrics ====== -->
  <rect x="40" y="760" width="760" height="180" rx="12" fill="#fffbeb" stroke="#b45309" stroke-width="1.5"/>
  <text x="60" y="790" font-size="15" font-weight="700" fill="#78350f">안전망 3종 (운영 kill switch)</text>

  <rect x="60" y="806" width="220" height="120" rx="8" fill="#ffffff" stroke="#b45309" stroke-width="1"/>
  <text x="170" y="830" font-size="12" font-weight="700" fill="#78350f" text-anchor="middle">forceRelease</text>
  <text x="170" y="852" font-size="10" fill="#475569" text-anchor="middle">운영자 명시 kill switch</text>
  <text x="170" y="868" font-size="10" fill="#475569" text-anchor="middle">대기자 즉시 reject +</text>
  <text x="170" y="884" font-size="10" fill="#475569" text-anchor="middle">entry 제거</text>
  <text x="170" y="906" font-size="9" fill="#15803d" text-anchor="middle">stuck owner escape hatch</text>

  <rect x="290" y="806" width="220" height="120" rx="8" fill="#ffffff" stroke="#b45309" stroke-width="1"/>
  <text x="400" y="830" font-size="12" font-weight="700" fill="#78350f" text-anchor="middle">forceTerminate</text>
  <text x="400" y="852" font-size="10" fill="#475569" text-anchor="middle">activeCount 강제 0</text>
  <text x="400" y="868" font-size="10" fill="#475569" text-anchor="middle">다른 핸들 release</text>
  <text x="400" y="884" font-size="10" fill="#475569" text-anchor="middle">실패해도 락 삭제</text>
  <text x="400" y="906" font-size="9" fill="#15803d" text-anchor="middle">락 누수 차단</text>

  <rect x="520" y="806" width="260" height="120" rx="8" fill="#ffffff" stroke="#b45309" stroke-width="1"/>
  <text x="650" y="830" font-size="12" font-weight="700" fill="#78350f" text-anchor="middle">evictStaleHead (2s 주기)</text>
  <text x="650" y="852" font-size="10" fill="#475569" text-anchor="middle">head 의 lease 키 EXISTS = 0</text>
  <text x="650" y="868" font-size="10" fill="#475569" text-anchor="middle">→ stale 판정 → LREM 1</text>
  <text x="650" y="906" font-size="9" fill="#15803d" text-anchor="middle">옛 인스턴스 진행 중단 대응</text>

  <!-- Metrics -->
  <rect x="820" y="760" width="740" height="180" rx="12" fill="#ecfdf5" stroke="#15803d" stroke-width="2"/>
  <text x="840" y="790" font-size="15" font-weight="700" fill="#14532d">운영 검증 결과 (최근 6개월)</text>

  <g font-size="12" fill="#0f172a">
    <text x="840" y="816">▸ 세션 유지율 — 99.2%</text>
    <text x="1170" y="816">▸ 동일 매장 동시 로그인 — 0건</text>
    <text x="840" y="840">▸ 댓글 등록 중복 — 0건 / 6개월</text>
    <text x="1170" y="840">▸ execution context destroyed — 0건</text>
    <text x="840" y="864">▸ 인스턴스 재시작 후 dead-letter 누수 — 0건</text>
    <text x="1170" y="864">▸ CROSSSLOT 에러 — 0건</text>
  </g>

  <text x="840" y="900" font-size="12" font-style="italic" fill="#15803d">cold-start guard + handoff + 안전망 3종이 모두 가동되는 패턴이 운영 로그에서 정기 검출됨</text>
  <text x="840" y="920" font-size="12" font-style="italic" fill="#15803d">— race 가 실제로 발생하지만 코드 레벨에서 차단되고 있음을 데이터로 입증</text>

  <!-- Footer -->
  <text x="40" y="990" font-size="11" fill="#64748b">참고 — 인스턴스 식별자를 lease value 에 박는 방식은 Martin Kleppmann 의 fencing token 패턴의 단순화 버전. 분산 락의 cross-instance ownership 검증을 lease-level 에서 보장.</text>
</svg>
